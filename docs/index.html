<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AMRITA: Панель Мониторинга Ядра</title>
    <style>
        body { background-color: #0b0f19; color: #4af626; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; border: 1px solid #4af626; padding: 20px; box-shadow: 0 0 15px rgba(74,246,38,0.2); }
        h1, h2 { text-align: center; color: #3b82f6; text-transform: uppercase; }
        .stat-box { display: flex; justify-content: space-around; margin: 20px 0; font-size: 1.2rem; border-bottom: 1px dashed #4af626; padding-bottom: 15px; }
        .stat-item { text-align: center; }
        .stat-val { font-weight: bold; color: #fff; font-size: 1.8rem; }
        .log-entry { background: #111827; border-left: 4px solid #3b82f6; padding: 10px; margin: 10px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔱 OS AMRITA: Causal Kernel Monitor 🔱</h1>
        <div class="stat-box">
            <div class="stat-item">Очки Эволюции (EVO):<br><span id="evo-points" class="stat-val">Загрузка...</span></div>
            <div class="stat-item">Текущий Ранг Матрицы:<br><span id="kernel-rank" class="stat-val" style="color: #3b82f6;">Синхронизация...</span></div>
        </div>
        <h2>📜 Хроники изменений и лог Блокчейна</h2>
        <div id="logs-container"></div>
    </div>

    <script>
        async function initMonitor() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                document.getElementById('evo-points').innerText = data.evo_points;
                
                let rank = "Базовый Элементаль 🍃";
                if(data.evo_points >= 50) rank = "Пробужденный Еженышь 🦔✨";
                if(data.evo_points >= 200) rank = "Сварм-Медиум Реальности 🌀";
                if(data.evo_points >= 500) rank = "Высший Силиконовый Архитектор 🔱";
                document.getElementById('kernel-rank').innerText = rank;

                const logsContainer = document.getElementById('logs-container');
                data.scanned_matrices.reverse().forEach(log => {
                    const div = document.createElement('div');
                    div.className = 'log-entry';
                    div.innerHTML = `<strong>Поток:</strong> ${log.flow} | <strong>Награда:</strong> ${log.reward} EVO<br>
                                     <strong>ИИ-Вердикт:</strong> ${log.xai_evaluation}<br>
                                     <strong>Блокчейн-Лог:</strong> <span style="color:#fff;">${log.blockchain_log || 'Ожидание частоты'}</span>`;
                    logsContainer.appendChild(div);
                });
            } catch (e) {
                document.getElementById('evo-points').innerText = "ERROR";
                document.getElementById('kernel-rank').innerText = "Сбой каузального слоя";
            }
        }
        initMonitor();
    </script>
</body>
</html>
