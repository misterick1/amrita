version: '3.8'

services:
  quantum_orchestrator:
    image: python:3.11-slim
    command: python /app/quantum_orchestrator.py
    volumes:
      - .:/app
    environment:
      - TOTAL_SUPPER_SUPPLY=108
      - AUTHOR_COINS=70
      - COLOSSEUM_POOL=38
    networks:
      - amrita_network
    deploy:
      replicas: 1

  hal_bot_network:
    image: python:3.11-slim
    command: sh -c "sleep 10 && python /app/hal_delay_stabilizer.py"
    volumes:
      - .:/app
    environment:
      - BOT_COUNT=5
      - CALIBRATION_MODE=active
    networks:
      - amrita_network
    deploy:
      mode: replicated
      replicas: 5 # Запуск ровно 5 ИИ-ботов, как на вашей схеме сети
      update_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure

networks:
  amrita_network:
    driver: overlay
