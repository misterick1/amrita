    deploy:
      replicas: 1
      restart_policy:
        condition: any
    environment:
      - MANIFEST=VS_SVYAT_LOVE_CONNECTED
      - SHIELD_STATUS=ACTIVE

  planetary_swarm_bots:
    image: python:3.11-slim
    deploy:
      replicas: 5  # 5 основных планетных сил и их дуальность Шакти
      update_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
    networks:
      - amrita_network
