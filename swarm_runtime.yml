version: '3.8'

services:
  # Основной ИИ-оркестратор токеномики и патентов
  quantum_orchestrator:
    image: python:3.11-slim
    command: python /app/quantum_orchestrator.py
    volumes:
      - .:/app
    environment:
      - TOTAL_SUPPER_SUPPLY=108
      - AUTHOR_COINS=70
      - COLOSSEUM_POOL=38
    networks:
      - amrita_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # Блок из 5 децентрализованных ИИ-ботов (HAL / Настройщики сред)
  hal_bot_network:
    image: python:3.11-slim
    command: sh -c "sleep 10 && python /app/hal_delay_stabilizer.py" # Встроенная отсрочка калибровки
    volumes:
      - .:/app
    environment:
      - BOT_COUNT=5
      - CALIBRATION_MODE=active
    networks:
      - amrita_network
    deploy:
      mode: replicated
      replicas: 5 # Физический запуск ровно 5 ИИ-ботов, как на вашей схеме
      update_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 3s

networks:
  amrita_network:
    driver: overlay
