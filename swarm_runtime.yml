version: '3.8'

services:
  quantum_orchestrator_ai:
    image: python:3.11-slim
    command: python /app/quantum_orchestrator.py
    volumes:
      - .:/app
    environment:
      - TOTAL_SUPPER_SUPPLY=108
      - AUTHOR_COINS=70
      - COLOSSEUM_POOL=38
      - NODE_ENV=production
    deploy:
      mode: replicated
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
    networks:
      - amrita_quantum_network

networks:
  amrita_quantum_network:
    driver: overlay
