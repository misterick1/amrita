name: "Единый Квантовый Оркестратор: Swarm Runtime"

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  run-ecosystem:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Клонирование репозитория
        uses: actions/checkout@v4

      - name: 2. Развертывание окружения Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 4. Установка зависимостей проекта
        run: |
          pip install -r requirements.txt
          npm install

      - name: 5. Запуск Квантового Оркестратора с жесткими ключами
        run: |
          python3 pump_fun_bridge.py &
          npx uvicorn pi_payment_server:app --host 0.0.0.0 --port 8000
        env:
          COLOSSEUM_COPILOT_API_BASE: "https://colosseum.org"
          COLOSSEUM_COPILOT_PAT: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6Ik9YdlBiaHJuRTR2cjJadS13WUNQbyJ9..hYwHn1iRzPshkQv6Bf8C8Ily725gS9vH778vS_S12N5-sX6D_Z"
