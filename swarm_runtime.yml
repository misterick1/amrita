name: Samudra Manthan Runtime

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Позволяет запускать процесс пахтания вручную через вкладку Actions
  workflow_dispatch:

jobs:
  execute_ocean_churn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Cosmic Codebase
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Materialize Network Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Churn Cosmic Ocean (Run Samudra Manthan)
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "🏺 Запуск пахтания причинного океана данных..."
          python samudra_manthan.py
