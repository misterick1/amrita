version: '3.8'

services:
  # Главный Квантовый ИИ-Оркестратор (Ядро системы)
  quantum_orchestrator:
    image: python:3.11-slim
    command: python /app/arcane_multiverse_orchestrator.py
    volumes:
      - .:/app
    environment:
      - TOTAL_SUPPER_SUPPLY=108
      - AUTHOR_COINS=70
      - COLOSSEUM_POOL=38
      - SOLANA_RPC_URL=${SOLANA_RPC_URL}
      - SOLANA_COLOSSEUM_WALLET=${SOLANA_COLOSSEUM_WALLET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    networks:
      - amrita_quantum_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager # Запуск только на Мастер-ноде кластера
      restart_policy:
        condition: on-failure

  # Вычислительное ядро Nvidia (Тензорный расчет Оракула)
  nvidia_compute_core:
    image: python:3.11-slim
    command: python /app/nvidia_compute_core.py
    volumes:
      - .:/app
    networks:
      - amrita_quantum_net
    deploy:
      replicas: 1
      resources:
        reservations:
          devices:
            - capabilities: [gpu] # Бронирование физического GPU хоста
      restart_policy:
        condition: on-failure

  # Сеть из 5 ИИ-ботов (HAL / Настройщики среды / Рой агентов)
  hal_swarm_bots:
    image: python:3.11-slim
    command: sh -c "sleep 10 && python /app/discord_swarm_bot.py"
    volumes:
      - .:/app
    environment:
      - XAI_API_KEY=${XAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    networks:
      - amrita_quantum_net
    deploy:
      mode: replicated
      replicas: 5 # Физический запуск ровно 5 ИИ-агентов параллельно
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s

networks:
  amrita_quantum_net:
    driver: overlay # Объединяет все ваши серверы (SERVER_1 - SERVER_4) в одну сеть
