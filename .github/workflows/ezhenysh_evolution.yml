name: 🦔 Ezhenysh Autonomous Evolution Loop

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        persist-credentials: true # Разрешает пушить обратно в репозиторий

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get install -y tesseract-ocr tesseract-ocr-rus tesseract-ocr-eng
        pip install pyTelegramBotAPI pillow pytesseract requests

    - name: Execute Interchain Firmware
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      run: python build_chapter.py

    - name: Commit and Push New Chapter
      run: |
        git config --global user.name "Ezhenysh Autonomous Loop"
        git config --global user.email "ezhenysh-loop@amrita.ai"
        git add BOOK_CHAPTER_*.md
        # Проверяем, появились ли новые файлы, чтобы не падать при пустом коммите
        if git diff --staged --quiet; then
          print "No changes to commit"
        else
          git commit -m "🤖 Еженышь Loop: Запечатать новую главу автоматизации"
          git push origin main
        fi
