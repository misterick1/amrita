name: "🦔 Ezhenysh Swarm Evolution - Emerald Edition"

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/15 * * * *' # Цикл дыхания каждые 15 минут

jobs:
  evolution_loop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install solana solders httpx

      - name: Run Swarm Core Logic
        # Жёсткий проброс секретов репозитория в переменные окружения ОС
        env:
          SOLANA_RPC: ${{ secrets.SOLANA_RPC___ }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          SERVER_1: ${{ secrets.SERVER_1 }}
          SERVER_2: ${{ secrets.SERVER_2 }}
          SERVER_3: ${{ secrets.SERVER_3 }}
          SERVER_4: ${{ secrets.SERVER_4 }}
          PI_API_KEY: ${{ secrets.PI_API_KEY }}
        run: python swarm_core.py
