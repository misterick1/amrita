name: Ezhenysh Swarm Evolution

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  evolve_swarm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Quantum Stack Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Ezhenysh Evolution Module
        run: |
          if [ -f ezhenysh_bot.py ]; then python ezhenysh_bot.py; else echo "Core module not found"; fi

      - name: Commit and Sealed History Log
        run: |
          git config --local user.email "misterick1@gmail.com"
          git config --local user.name "misterick1"
          git add -A
          if ! git diff-index --quiet HEAD --; then
            git commit -m "🔱 AMRITA: Quantum state synchronized and sealed via GitHub Actions"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes in quantum field state."
          fi
