    - name: Старт побитового DART-вещания и RWA контроля
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        DEVELOPER_WALLET: ${{ secrets.DEVELOPER_WALLET }}
      run: |
        # Запускаем трекер RWA параллельно с основным маршрутизатором
        python amrita_rwa_tracker.py &
        python amrita_core_router.py
