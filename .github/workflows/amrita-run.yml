          XAI_API_KEY: '${{ secrets.XAI_API_KEY }}'
          SOLANA_RPC_URL: '${{ secrets.SOLANA_RPC_URL }}'
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          MINT_ADDRESS: 'EPjFwdd5AufqSSqSem2qN1xzybapC8G4wEGGkZwyTDt1'
        run: |
          echo "==== [AMRITA SYSTEM INITIALIZATION] ===="
          echo "Status: Causal synchronization initiated."
          echo "Balancing 108 Quants: 70 Suras / 38 Asuras"

          # Запуск объединенного Роя (Сознание, Щит Colosseum и xAI) в фоновом режиме
          echo "Launching Monolithic Swarm Orchestrator (Rainbow Spectrum)..."
          nohup python mass_activation_orchestrator.py > swarm.log 2>&1 &

