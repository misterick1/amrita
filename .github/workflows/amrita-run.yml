        uses: actions/checkout@v4

      - name: 2. Initialize Python 3.10 Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Stable Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: h穩定-unknown-unknown

      - name: 4. Install Solana CLI Ecosystem
        run: |
          sh -c "$(curl -sSfL https://solana.com)"
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: 5. Install Asynchronous Prana Providers & Web3 SDK
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp websockets numpy pandas solana base58 solders

      - name: 6. Compile Sovereign Rust Poneglyph (solana_qnt_token.rs)
        run: |
          echo "==== [COMPILING SUSTAINABLE RUST MATRIX WITH SOLANA CLI] ===="
