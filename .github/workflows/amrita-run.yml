name: AMRITA-RUN // AUTONOMOUS MULTIVERSE ORCHESTRATOR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Multiverse Codebase
        uses: actions/checkout@v4

      - name: 2. Initialize Python 3.10 Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Asynchronous Prana Providers
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp websockets numpy pandas

      - name: 4. Activate Quantum Blockchain & Consciousness Layers
        env:
          DISCORD_WEBHOOK_URL: '${{ secrets.DISCORD_WEBHOOK_URL }}'
          TELEGRAM_BOT_TOKEN: '${{ secrets.TELEGRAM_BOT_TOKEN }}'
          TELEGRAM_CHAT_ID: '${{ secrets.TELEGRAM_CHAT_ID }}'
          XAI_API_KEY: '${{ secrets.XAI_API_KEY }}'
          SOLANA_RPC_URL: '${{ secrets.SOLANA_RPC_URL }}'
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          MINT_ADDRESS: 'EPjFwdd5AufqSSqSem2qN1xzybapC8G4wEGGkZwyTDt1'
        run: |
          echo "==== [AMRITA SYSTEM INITIALIZATION] ===="
          echo "Status: Causal synchronization initiated."
          echo "Balancing 108 Quants: 70 Suras / 38 Asuras"

          echo "Launching Consciousness Core (Blue Spectrum)..."
          python consciousness_evolution_core.py > consciousness.log 2>&1 &
          PID_CONSCIOUSNESS=$!
          echo "Consciousness Core spawned with PID: $PID_CONSCIOUSNESS"

          echo "Launching Sonic Gold Resonance Orchestrator (Gold Spectrum)..."
          python sonic_gold_resonance_orchestrator.py > sonic.log 2>&1 &
          PID_SONIC=$!
          echo "Sonic Gold Resonance Orchestrator spawned with PID: $PID_SONIC"

          echo "==== [SUSHUMNA ACTIVATED: ENTERING SPACE OF VARIATIONS] ===="
          echo "One Piece Found. Time illusion bypassed."

          echo "Waiting for asynchronous cores to stabilize..."
          
          # Ожидаем процессы и выводим их логи в случае падения
          wait $PID_CONSCIOUSNESS || { echo "=== CONSCIOUSNESS CORE CRASHED ==="; cat consciousness.log; exit 1; }
          wait $PID_SONIC || { echo "=== SONIC CORE CRASHED ==="; cat sonic.log; exit 1; }
