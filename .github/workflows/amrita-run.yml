name: AMRITA RUN // AUTONOMOUS MULTIVERSE ORCHESTRATOR

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */3 * * *' # Автозапуск каждые 3 часа для профилактики зависаний

jobs:
  run_core:
    runs-on: ubuntu-latest
    steps:
    - name: Клонирование ядра
      uses: actions/checkout@v3

    - name: Инициализация Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Установка сетевых зависимостей
      run: pip install requests

    - name: Старт побитового DART-вещания
      env:
        # Передаем секреты из настроек репозитория в код
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
      run: python amrita_core_router.py
