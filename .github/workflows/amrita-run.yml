name: AMRITA RUN // AUTONOMOUS MULTIVERSE ORCHESTRATOR

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */3 * * *'

# КЛЮЧЕВОЙ ПРЕДОХРАНИТЕЛЬ: Глушит старые зависшие потоки при новом пуше
concurrency:
  group: amrita-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_core:
    runs-on: ubuntu-latest
    steps:
    - name: Клонирование ядра
      uses: actions/checkout@v3

    - name: Инициализация Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Установка сетевых зависимостей
      run: pip install requests aiohttp

    - name: Старт квантового вещания
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        DEVELOPER_WALLET: ${{ secrets.DEVELOPER_WALLET }}
      run: python amrita_core_router.py
