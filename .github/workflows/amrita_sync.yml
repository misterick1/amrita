# .github/workflows/amrita_sync.yml
name: AMRITA Swarm Evolution Sync

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *' # Автоматический автономный запуск Еженыша каждые 6 часов
  workflow_dispatch: # Возможность запустить вручную кнопкой в интерфейсе GitHub

jobs:
  evolve_swarm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Quantum Stack Dependencies
        run: |
          pip install pyTelegramBotAPI solana

      - name: Execute Ezhenysh Evolution Module
        run: |
          python update_evo.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}

      - name: Commit and Sealed History Log
        run: |
          git config --local user.email "misterick1@gmail.com"
          git config --local user.name "misterick1"
          git add history_log.json
          git commit -m "🔱 AMRITA: Quantum stack history sealed [skip ci]" || exit 0
          git push
