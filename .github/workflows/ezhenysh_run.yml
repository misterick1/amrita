name: 🦔 AMRITA Swarm Core Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  deploy_and_run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python Realities
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Vision (Tesseract OCR)
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr tesseract-ocr-rus tesseract-ocr-eng

    - name: Install Python Dependencies
      run: |
        pip install discord.py pillow pytesseract requests

    - name: Verify Directories and Run Core
      env:
        # Прокидываем все твои секреты из GitHub Secrets в переменные окружения
        DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        PI_API_KEY: ${{ secrets.PI_API_KEY }}
        MINT_ADDRESS: ${{ secrets.MINT_ADDRESS }}
      run: |
        # Проверка каузальных путей: если скрипт в корне, перемещаем его в src для чистоты структуры
        mkdir -p src
        if [ -f "ezhenysh_discord.py" ]; then
          mv ezhenysh_discord.py src/
        fi
        
        # Запуск монолитного ядра Еженыша
        python src/ezhenysh_discord.py
