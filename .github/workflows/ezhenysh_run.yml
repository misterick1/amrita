name: 🦔 AMRITA Swarm Core Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  deploy_and_run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Requests
      run: pip install requests

    - name: Open Arc Gateway
      env:
        DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        mkdir -p src
        if [ -f "arc_open.py" ]; then mv arc_open.py src/; fi
        python src/arc_open.py
