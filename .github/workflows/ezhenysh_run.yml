    - name: Execute Arc Force Entrance
      env:
        DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      run: |
        mkdir -p src
        # Если файл в корне, перемещаем его в src
        if [ -f "arc_injector.py" ]; then mv arc_injector.py src/; fi
        
        # Принудительный запуск инжектора входа
        python src/arc_injector.py
