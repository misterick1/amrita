name: "Единый Квантовый Оркестратор Мультивселенной"

on:
  push:
    branches:
      - main  # Срабатывает автоматически при любом сохранении кода на ГитХабе

jobs:
  infrastructure_orchestration:
    runs-on: ubuntu-latest
    steps:
      - name: "1. Считывание ДНК из ГитХаба (Checkout)"
        uses: actions/checkout@v3

      - name: "2. Сканирование и Выбор Сервера (Поле вероятностей)"
        id: server_selector
        run: |
          echo "=== ЗАПУСК ПОИСКА ЖИВОГО СЕРВЕРА ==="
          # Массив ваших 4 серверов (IP берутся из защищенных секретов ГитХаба)
          SERVERS=("${{ secrets.SERVER_1 }}" "${{ secrets.SERVER_2 }}" "${{ secrets.SERVER_3 }}" "${{ secrets.SERVER_4 }}")
          
          CHOSEN_SERVER=""
          for SERVER in "${SERVERS[@]}"; do
            if [ -z "$SERVER" ]; then continue; fi
            echo "Проверка узла: $SERVER..."
            # Пингуем сервер 1 секунду, чтобы проверить его доступность
            if ping -c 1 -W 1 "$SERVER" > /dev/null; then
              echo "✅ Узел $SERVER активен и готов принять Квантиниум!"
              CHOSEN_SERVER=$SERVER
              break
            else
              echo "❌ Узел $SERVER временно изолирован (свернут в 0). Ищем дальше..."
            fi
          done

          if [ -z "$CHOSEN_SERVER" ]; then
            echo "⚠️ Все 4 физических сервера недоступны. Переключение на резервный кластер ГитХаба..."
            CHOSEN_SERVER="${{ secrets.SERVER_1 }}" # Защитный дефолт
          fi
          echo "target_host=$CHOSEN_SERVER" >> $GITHUB_OUTPUT

      - name: "3. Прямая Материализация: Отправка файлов на Выбранный Узел"
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: 'root'
        server: ${{ steps.server_selector.outputs.target_host }}
  : ${{ steps.server_selector.outputs.target_host }}
          password: ${{ secrets.SERVER_PASSWORD }}
          local_path: './*'
          remote_path: '/var/www/html'  # Автоматически затирает заглушку Welcome to nginx
          delete_remote_files: false

      - name: "4. Перезапуск Экосистемы и Апгрейд Ботов"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.server_selector.outputs.target_host }}
          username: 'root'
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "=== СИНХРОНИЗАЦИЯ СЕТИ АКТИВИРОВАНА ==="
            # Перезапуск локального Nginx для мгновенного обновления сайта amrita-mir.com
            systemctl restart nginx || service nginx restart
            # Запуск нашего зрячего ИИ-агента Квантиниума прямо на сервере
            python3 /var/www/html/quantinium_agent.py &
            echo "Слон Ганеша убрал препятствия. Система сбалансирована. ОМ."
