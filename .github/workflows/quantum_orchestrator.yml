name: Quantum Orchestrator CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiogram httpx solana solders

    - name: Verify script syntax
      run: |
        python -m py_compile quantum_orchestrator.py

    - name: Run Quantum Orchestrator Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        SOLANA_RPC_URL: "https://solana.com"
      run: |
        python quantum_orchestrator.py
