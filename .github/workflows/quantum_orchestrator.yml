name: "Единый Квантовый Оркестратор Мультивселенной"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  infrastructure_orchestration:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Инициализация репозитория
        uses: actions/checkout@v4

      - name: 2. Развертывание Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 4. Синхронизация зависимостей
        run: |
          pip install -r requirements.txt
          npm install

      - name: 5. Автономный запуск модулей (Тест 60 сек)
        env:
          COLOSSEUM_COPILOT_API_BASE: "https://colosseum.com"
          COLOSSEUM_COPILOT_PAT: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..PS7E2CiMBqjO27EpLUGYKoGDhz_3gdCe5w0-UITAal"
          KEY_SUFIX_COM: "epminnyv_ZGF0YV_jb20="
          KEY_SUFIX_RU: "epminnyv_ZGF0YV_ydQ=="
          KEY_SUFIX_MIR: "epminnyv_ZGF0YV_taXI="
          PI_API_KEY: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6Ik9YdlBiaHJuRTR2cjJadS13WUNQbyJ9..hYwHn1iRzPshkQv6Bf8C8Ily725gS9vH778vS_S12N5-sX6D_Z"
          PI_NETWORK_APP_ID: "epminnyv"
          DISCORD_WEBHOOK_URL: "https://discord.com"
        run: |
          python3 pump_fun_bridge.py &
          npx uvicorn pi_payment_server:app --host 0.0.0.0 --port 8000 &
          echo "Солитон активен в виртуальной машине. Очередь пройдена, сбор логов..."
          sleep 60
          kill $(jobs -p) || true
