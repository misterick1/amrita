name: Quantum Amrita Orchestrator CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  multiverse_alignment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Multiverse Matrix
        uses: actions/checkout@v4

      - name: Build and Deploy Bio-Plate (GitHub Pages)
        uses: actions/configure-pages@v4
        
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
