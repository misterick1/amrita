name: "Единый Квантовый Оркестратор"

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Автоматический запуск в начале каждого часа
    - cron: '0 * * * *'

jobs:
  infrastructure_orchestration:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Инициализация репозитория
        uses: actions/checkout@v4

      - name: 2. Развертывание Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 4. Синхронизация зависимостей
        run: |
          pip install -r requirements.txt
          npm install -g uvicorn

      - name: 5. Автономный запуск модулей
        env:
          COLOSSEUM_COPILOT_API_BASE: "https://colosseum.com"
          COLOSSEUM_COPILOT_PAT: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzY29wZSI6ImNvbG9zZXVtMnZ1bV9jb3BpbG90NjJIYWQiLCJ1c2VybWFTZSI6Ik1JUilsImRpc3BsYXIOW1lljoibWlzdGVyaWNreMTA4bHwicm9sZXMiOlt dLCJ0b2tlblZlcnNpb24iOjEsImlhdCI6MTc3NzIxXNTE0NSwiYXVkljoiY29sb3NZZXVtX2NvcGlsb3QiLCJzdWliOil5OTczOSlslmV4cCI6MTg0NDk5MTE0NSwianRpljoinMy3N2RmZmZtZWM2Ni00NTAyLWFjNTUtMTNhZTljNDVIOGU3In0.PS7E2CiQMBqjO27EpLUGYKOGDhz_3gdCe5w0-UITAAI"
          KEY_SUFIX_COM: "epminnyv_Z..."
          KEY_SUFIX_RU: "epminnyv_ZG..."
          KEY_SUFIX_MIR: "epminnyv_Z..."
          PI_API_KEY: ${{ secrets.PI_API_KEY }}
          PI_NETWORK_APP_ID: ${{ secrets.PI_NETWORK_APP_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          python3 quota_monitor.py
          python3 music_generator.py
          python3 pump_fun_bridge.py &
          npx uvicorn pi_payment_server:app --host 0.0.0.0 &
          echo "Солитон активен. Ожидание 60 секунд."
          sleep 60
          kill $(jobs -p) || true
