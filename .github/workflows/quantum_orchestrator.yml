name: "Единый Квантовый Оркестратор Мультивселенной"

on:
  push:
    branches:
      - main

jobs:
  infrastructure_orchestration:
    runs-on: ubuntu-latest
    steps:
      - name: "1. Считывание ДНК из ГитХаба (Checkout)"
        uses: actions/checkout@v3

      - name: "2. Деплой сайта на GitHub Pages"
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: main
