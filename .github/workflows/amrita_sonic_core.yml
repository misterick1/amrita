name: AMRITA: GOLDEN SONIC QUANTUM RUNTIME
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка кодовой базы Сознания
        uses: actions/checkout@v4
      - name: Настройка Квантового Окружения Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Развертывание Системных Зависимостей Потока
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp websockets
      - name: Рантайм Квантового Потока и Валидаторов
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python consciousness_evolution_core.py &
          python sonic_gold_resonance_orchestrator.py
