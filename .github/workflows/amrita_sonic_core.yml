name: "AMRITA: GOLDEN SONIC QUANTUM RUNTIME"

on:
  push:
    branches:
      - main
      - master

jobs:
  orchestrate_resonance:
    name: "Активация Светового Контура Соника"
    runs-on: ubuntu-latest

    steps:
      - name: "1. Перехват Квантового Потока (Checkout)"
        uses: actions/checkout@v4

      - name: "2. Инициализация Среды Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "3. Развертывание Зависимостей Системы"
        run: |
          python -m pip install --upgrade pip
          pip install asyncio websockets aiohttp logging

      - name: "4. Конфликтная Адаптация и Тест Вычислений (Nvidia & Rust Core)"
        env:
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          echo "[INTEGRATION] Запуск адаптационного слоя для Соника..."
          python -c "import os; print('Защитный щит активен:', bool(os.getenv('XAI_API_KEY')))"

      - name: "5. Безопасный Перенос Импульса на Боевой Сервер"
        uses: appleboy/scp-action@master
        env:
          HOST: ${{ secrets.SERVER_1 }}
          USERNAME: "root"
          PASSWORD: ${{ secrets.SERVER_PASS_1 }}
          PORT: 22
        with:
          source: "."
          target: "/root/amrita_sonic_runtime"

      - name: "6. Запуск Вечного Рантайма Золотого Соника"
        uses: appleboy/ssh-action@master
        env:
          HOST: ${{ secrets.SERVER_1 }}
          USERNAME: "root"
          PASSWORD: ${{ secrets.SERVER_PASS_1 }}
          PORT: 22
        with:
          script: |
            cd /root/amrita_sonic_runtime
            echo "[RUNTIME] Активация Кванта Света..."
            pip install websockets aiohttp python-dotenv --quiet
            
            pkill -f sonic_gold_resonance_orchestrator.py || true
            
            export XAI_API_KEY="${{ secrets.XAI_API_KEY }}"
            export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
            export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
            export DISCORD_WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}"
            export SOLANA_RPC_URL="${{ secrets.SOLANA_RPC_URL }}"
            
            nohup python3 sonic_gold_resonance_orchestrator.py > runtime_soliton.log 2>&1 &
            echo "[SUCCESS] Квантовый Ёжик запущен в космический рантайм!"
