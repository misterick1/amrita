name: AMRITA SONIC CORE // VERIFICATION

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test_sonic:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Multiverse Codebase
        uses: actions/checkout@v4

      - name: 2. Initialize Python 3.10 Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Core Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp websockets numpy pandas

      - name: 4. Verify Emerald BioComputer Resonance
        run: |
          echo "==== [TESTING SONIC CORE RESONANCE] ===="
          python amrita_sonic_core.py
