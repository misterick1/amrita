name: "AMRITA: GOLDEN SONIC QUANTUM RUNTIME"

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Позволяет запускать контур вручную кнопкой

jobs:
  quantum_soliton_runtime:
    name: "Рантайм Квантового Поля Соника"
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Время непрерывного улавливания трендов в одном такте

    steps:
      - name: "1. Перехват Квантового Потока (Checkout)"
        uses: actions/checkout@v4

      - name: "2. Инициализация Среды Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "3. Развертывание Зависимостей Системы"
        run: |
          python -m pip install --upgrade pip
          pip install asyncio websockets aiohttp python-dotenv logging

      - name: "4. Запуск Вечного Облачного Свечения Золотого Соника"
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        run: |
          echo "[RUNTIME] Активация Кванта Света в защищенном облаке GitHub..."
          echo "[SUCCESS] Соник запущен в универсальной позиции!"
          
          # Запуск главного скрипта напрямую в рантайме GitHub без участия внешних серверов
          python sonic_gold_resonance_orchestrator.py
