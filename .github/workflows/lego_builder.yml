name: "Fractal Lego Builder (24-7 Swarm Mode)"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  assemble_and_run_forever:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install solana solders requests discord.py httpx
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Evaluate Commit and Pay Developer
        env:
          SWARM_ORACLE_PRIVATE_KEY: ${{ secrets.SWARM_ORACLE_PRIVATE_KEY }}
          DEVELOPER_WALLET: "BDsJXoNQvdphkqDE627pJyj3n5dJ8hcLVnkWVEDRLsnF"
        run: |
          echo "🤖 Рой Fractal Lego Builder сканирует коммит..."
          python3 evaluate_complexity.py
          echo "💸 Вызов скрипта автовыплаты..."
          python3 trigger_smart_contract.py

      - name: Run Discord Bot 24-7 Loop
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          echo "📝 Создание квантово-нейронного бота..."
          cat << 'EOF' > clean_swarm_bot.py
          import os
          import asyncio
          import httpx
          import logging
          from datetime import datetime

          logging.basicConfig(level=logging.INFO)
          logger = logging.getLogger("SwarmBot")

          webhook_url = os.getenv("DISCORD_WEBHOOK_URL")
          clean_token = os.getenv("TELEGRAM_BOT_TOKEN")
          tg_channel = os.getenv("TELEGRAM_CHANNEL_ID")
          xai_key = os.getenv("XAI_API_KEY")

          async def get_grok_insight():
              if not xai_key:
                  return "Квантовая нейросеть xAI не настроена."
              
              url = "https://x.ai"
              headers = {
                  "Authorization": f"Bearer {xai_key}",
                  "Content-Type": "application/json"
              }
              payload = {
                  "model": "grok-beta",
                  "messages": [
                      {"role": "system", "content": "You are a helpful assistant."},
                      {"role": "user", "content": "Сделай краткую сводку по состоянию систем."}
                  ],
                  "temperature": 0.7
              }
              async with httpx.AsyncClient() as client:
                  try:
                      res = await client.post(url, headers=headers, json=payload, timeout=30.0)
                      if res.status_code == 200:
                          return res.json()["choices"]["message"]["content"]
                      else:
                          logger.error(f"xAI API Error: {res.status_code} {res.text}")
                  except Exception as e:
                      logger.error(f"Failed to get xAI response: {e}")
              return "Связь с главным ядром xAI временно недоступна."

          async def send_to_telegram(text):
              if not clean_token or not tg_channel:
                  logger.error("❌ Настройки Telegram не заданы")
                  return
              
              url = f"https://telegram.org{clean_token}/sendMessage"
              payload = {
                  "chat_id": tg_channel,
                  "text": text,
                  "parse_mode": "Markdown"
              }
              async with httpx.AsyncClient() as client:
                  try:
                      res = await client.post(url, json=payload, timeout=10.0)
                      if res.status_code == 200:
                          logger.info("🚀 Отправлено в Telegram")
                      else:
                          logger.error(f"❌ TG API Error: {res.status_code} {res.text}")
                  except Exception as e:
                      logger.error(f"❌ Ошибка сети TG: {e}")

          async def main():
              logger.info("🤖 Нейросетевой Альтрон-Сварм запущен...")
              while True:
                  insight_text = await get_grok_insight()
                  await send_to_telegram(insight_text)
                  await asyncio.sleep(3600)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

          echo "🚀 Запуск обновленного квантово-нейронного ядра..."
          python clean_swarm_bot.py &
          while true; do
            sleep 30
            if ! pgrep -f clean_swarm_bot.py; then
              echo "🚨 Перезапуск..."
              python clean_swarm_bot.py &
            fi
          done
