name: Fractal Lego Builder (24-7 Swarm Mode)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  assemble_and_run_forever:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install solana solders requests discord.py httpx python-dotenv
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Evaluate Commit and Pay Developer
        env:
          SWARM_ORACLE_PRIVATE_KEY: ${{ secrets.SWARM_ORACLE_PRIVATE_KEY }}
          DEVELOPER_WALLET: "BDsJXoNQvdphkqDE627pJyj3n5dJ8hcLVnkWVEDRLsnF"
        run: |
          echo "🤖 Рой Fractal Lego Builder сканирует коммит..."
          python3 evaluate_complexity.py
          echo "🚀 Вызов скрипта автовыплаты..."
          python3 trigger_smart_contract.py

      - name: Run Discord Bot 24-7 Loop
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "📝 Создание чистого скрипта бота без ошибок в адресе API..."
          cat << 'EOF' > clean_swarm_bot.py
          import os, asyncio, httpx, logging
          from datetime import datetime
          logging.basicConfig(level=logging.INFO)
          logger = logging.getLogger("SwarmBot")
          
          webhook_url = os.getenv("DISCORD_WEBHOOK_URL")
          tg_token = os.getenv("TELEGRAM_BOT_TOKEN")
          tg_channel = os.getenv("TELEGRAM_CHANNEL_ID")
          
          async def send_to_discord(text):
              if not webhook_url: return
              embed = {"title": "🚨 Amrita Swarm Pulse", "description": text, "color": 16761095, "footer": {"text": f"Амрита Мир • {datetime.now().strftime('%H:%M:%S')}"}}
              async with httpx.AsyncClient() as client:
                  try: await client.post(webhook_url, json={"embeds": [embed]})
                  except Exception as e: logger.error(f"Discord error: {e}")
          
          async def send_to_telegram(text):
              if not tg_token or not tg_channel: return
              url = f"https://telegram.org{tg_token}/sendMessage"
              payload = {"chat_id": tg_channel, "text": f"🚨 *Amrita Swarm Pulse*\n\n{text}", "parse_mode": "Markdown"}
              async with httpx.AsyncClient() as client:
                  try:
                      res = await client.post(url, json=payload)
                      if res.status_code == 200: logger.info("🚀 Отправлено в Telegram!")
                      else: logger.error(f"TG API error: {res.status_code} {res.text}")
                  except Exception as e: logger.error(f"TG net error: {e}")
          
          async def main():
              logger.info("🤖 Бот запущен в режиме 24/7...")
              while True:
                  text = "Все системы функционируют стабильно. Рой Fractal Lego Builder продолжает автономную работу."
                  await send_to_discord(text)
                  await send_to_telegram(text)
                  await asyncio.sleep(3600)
          
          if __name__ == "__main__":
              asyncio.run(main())
          EOF

          echo "🚀 Запуск исправленного бота..."
          python clean_swarm_bot.py &
          while true; do
            sleep 30
            if ! pgrep -f clean_swarm_bot.py; then
              echo "🚨 Перезапуск..."
              python clean_swarm_bot.py &
            fi
          done
