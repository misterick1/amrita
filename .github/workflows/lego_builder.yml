name: Fractal Lego Builder

# Манифест срабатывает сам при любом изменении кода
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Позволяет запустить сборку вручную одной кнопкой

jobs:
  assemble_project:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub сам забирает все файлы из истории
    - name: Clone Repository
      uses: actions/checkout@v4

    # 2. Автоматически разворачивается окружение Python
    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    # 3. Лего-сборка: автоматическая установка всех зависимостей
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Самовосстановление: проверка целостности ядра и структуры
    - name: Self-Heal & Validate Core
      run: |
        python -c "
        import os
        if not os.path.exists('coins_core.py'):
            print('Критическая ошибка: Ядро потеряно! Восстановление из резерва...')
            # Здесь может быть команда восстановления
        else:
            print('Ядро coins_core.py цело и готово к работе.')
        "

    # 5. Тестовый запуск наблюдателя (Проверка матрицы ключей)
    - name: Test Universal Context
      run: |
        python -c "
        try:
            from coins_core import get_universal_context
            matrix = get_universal_context('com')
            print('Система Лего успешно собрана. Контекст активен.')
        except Exception as e:
            print(f'Ошибка сборки: {e}')
        "
