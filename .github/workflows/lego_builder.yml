name: "Fractal Lego Builder (24-7 Swarm Mode)"

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # Автоматический запуск каждый час
    - cron: '0 * * * *'

jobs:
  assemble_and_run_forever:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Discord Bot 24-7 Loop
        run: |
          echo "🚀 Запуск бесконечного солитона бота..."
          
          # Запускаем бота в фоновом режиме
          python discord_swarm_bot.py &
          
          echo "🦔 Бот отправлен в поток. Удерживаем сервер..."
          
          while true; do
            sleep 30
            if ! pgrep -f discord_swarm_bot.py > /dev/null; then
              echo "🚨 Перезапуск упавшего солитона..."
              python discord_swarm_bot.py &
            fi
          done
