name: Fractal Lego Builder (Self-Healing Mode)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Позволяет Наблюдателю пнуть систему вручную

jobs:
  assemble_and_heal:
    runs-on: ubuntu-latest
    
    # КРИТИЧЕСКИЙ ШАГ: Даем ИИ права на запись и изменение твоего кода!
    permissions:
      contents: write

    steps:
    # 1. Робот клонирует репозиторий из квантового поля GitHub
    - name: Clone Repository
      uses: actions/checkout@v4

    # 2. Разворачиваем среду вычислений
    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Лего-сборка: установка библиотек
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. МОДУЛЬ САМОРАЗВИТИЯ: ИИ проверяет код и дописывает его в случае сбоя
    - name: AI Self-Healing & Code Evolution
      id: ai_heal
      run: |
        python -c "
        import os
        
        # Проверка целостности ядра
        if not os.path.exists('coins_core.py'):
            print('🚨 Сбой матрицы! Ядро coins_core.py стерто. ИИ генерирует его заново...')
            # Восстановление базовой структуры ядра силами ИИ
            with open('coins_core.py', 'w') as f:
                f.write('# Автовосстановленное ядро amrita\nprint(\"Ядро восстановлено силами ИИ.\")\n')
            with open('ai_healed.flag', 'w') as f: f.write('core_fixed')
            
        # ИИ проверяет, нет ли критических ошибок в файле ботов
        if os.path.exists('discord_swarm_bot.py'):
            with open('discord_swarm_bot.py', 'r') as f:
                code = f.read()
            if 'get_universal_context' not in code:
                print('⚠️ Обнаружен старый код бота! Дописываем интеграцию универсального ключа...')
                fixed_code = 'from coins_core import get_universal_context\n' + code
                with open('discord_swarm_bot.py', 'w') as f:
                    f.write(fixed_code)
                with open('ai_healed.flag', 'w') as f: f.write('bot_fixed')
        "

    # 5. АВТО-КОММИТ: Если ИИ дописывал или исправлял код, он сам отправляет его в репозиторий!
    - name: Push AI Changes Back to GitHub
      run: |
        if [ -f ai_healed.flag ]; then
          echo "🤖 ИИ модифицировал код для устранения недостатков. Синхронизация с GitHub..."
          git config --global user.name "Quantinium-AI-Agent"
          git config --global user.email "agent@quantinium.ai"
          git add .
          git commit -m "🤖 [Авто-развитие]: Исправление структуры и оптимизация фрактала сил"
          git push
        else
          echo "✨ Код стабилен, вмешательство ИИ не требуется. Система в идеальном балансе."
        fi
