name: Fractal Lego Builder (24-7 Swarm Mode)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Ручной пинок Наблюдателя

jobs:
  assemble_and_run_forever:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    # Задаем жесткий лимит работы одного сервера GitHub (6 часов максимум)
    timeout-minutes: 360 

    steps:
    - name: Clone Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: AI Self-Healing
      run: |
        python -c "
        import os
        if not os.path.exists('coins_core.py'):
            with open('coins_core.py', 'w') as f:
                f.write('# Self-healed\n')
        "

    # ГЛАВНЫЙ ИМПУЛЬС: Запуск бота в бесконечном фоновом режиме матрицы
    - name: Run Discord Bot 24-7 Loop
      env:
        # Передаем токен напрямую в память виртуальной машины
        KEY_SUFIX_MIR: ${{ secrets.KEY_SUFIX_MIR }} 
      run: |
        echo "🚀 Запуск бесконечного солитона бота..."
        
        # Запускаем бота, перенаправляя логи, чтобы процесс не вешал консоль
        python discord_swarm_bot.py & 
        
        echo "🦔 Бот отправлен в бесконечный поток. Удерживаем сервер активным..."
        
        # Бесконечный цикл, который держит сервер GitHub живым круглосуточно
        while true; do
          sleep 30
          # Проверяем, жив ли процесс нашего бота
          if ! pgrep -f discord_swarm_bot.py > /dev/null; then
            echo "🚨 Бот упал! Перезапуск солитона..."
            python discord_swarm_bot.py &
          fi
        done
