name: "Fractal Lego Builder (24-7 Swarm Mode)"

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # Автоматический запуск каждый час
    - cron: '0 * * * *'

jobs:
  assemble_and_run_forever:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Нужно для корректной работы git diff и оценки кода

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install solana solders requests
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Evaluate Commit and Pay Developer
        env:
          SWARM_ORACLE_PRIVATE_KEY: ${{ secrets.SWARM_ORACLE_PRIVATE_KEY }}
          DEVELOPER_WALLET: "BDsJXoNQvdphkqDE627pJyj3n5dJ8hcLVnkWVEDRLsnF"
        run: |
          echo "🤖 Рой Fractal Lego Builder сканирует изменения в коде..."
          python3 Github/scripts/evaluate_complexity.py
          echo "🚀 Вызов скрипта автовыплаты токенов AMRITA в сети Solana..."
          python3 Github/scripts/trigger_smart_contract.py

      - name: Run Discord Bot 24-7 Loop
        run: |
          echo "🚀 Запуск бесконечного солитона..."
          
          # Запускаем бота в фоновом режиме
          python discord_swarm_bot.py &
          
          echo "🦔 Бот отправлен в поток. Удержание процесса..."
          
          while true; do
            sleep 30
            if ! pgrep -f discord_swarm_bot.py; then
              echo "🚨 Перезапуск упавшего солитона..."
              python discord_swarm_bot.py &
            fi
          done
