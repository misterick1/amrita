name: Fractal Lego Builder (24-7 Swarm Mode)

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Автоматический перезапуск каждые 6 часов для обхода ограничений GitHub
  workflow_dispatch: # Позволяет запускать процесс вручную кнопкой

jobs:
  assemble_and_run_forever:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install solana solders requests discord.py
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Evaluate Commit and Pay Developer
      env:
        SWARM_ORACLE_PRIVATE_KEY: ${{ secrets.SWARM_ORACLE_PRIVATE_KEY }}
        DEVELOPER_WALLET: "BDsJXoNQvdphkQDE627pJyj3n5dJ8hcl"
      run: |
        echo "🤖 Рой Fractal Lego Builder сканирует изменения..."
        python3 evaluate_complexity.py
        echo "🚀 Вызов скрипта автовыплаты токенов AMRITA на кошелек разработчика..."
        python3 trigger_smart_contract.py

    - name: Run Discord Bot 24-7 Loop
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        echo "🚀 Запуск бесконечного солитона..."
        python discord_swarm_bot.py &

        while true; do
          sleep 30
          if ! pgrep -f discord_swarm_bot.py; then
            echo "🚨 Перезапуск упавшего солитона..."
            python discord_swarm_bot.py &
          fi
        done
