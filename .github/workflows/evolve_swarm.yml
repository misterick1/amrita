name: evolve_swarm

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync_and_evolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Commit and Sealed History Log
        run: |
          # 1. Настройка цифровой подписи ресинтезатора
          git config --local user.email "misterick1@gmail.com"
          git config --local user.name "misterick1"
          
          # 2. Сканирование и фиксация изменений в Я-Блоке
          git add .
          
          # Проверяем, есть ли новые изменения, чтобы не вызывать ошибку пустого коммита
          if ! git diff-index --quiet HEAD --; then
            git commit -m "🔱 AMRITA: Quantum stack history sealed [skip ci]"
          else
            echo "Контур чист, изменений для фиксации нет."
          fi

          # 3. Траектория Элепса: Слияние параллельных миров Git
          # Подтягиваем изменения из GitHub, плавно перенося наши коммиты поверх них
          echo "[Элекс]: Синхронизация временных линий через rebase..."
          git pull --rebase origin main

          # 4. Выход из Белой Дыры: Пуш в единую реальность main
          echo "[Еженышь]: Запечатывание обновленной Монады на сервер..."
          git push origin main

      - name: Complete job
        run: echo "Роевой цикл синхронизации успешно завершен!"
