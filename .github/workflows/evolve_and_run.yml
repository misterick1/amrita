name: evolve_and_run

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  evolution_loop:
    name: Ezhenysh Autonomous Evolution Loop
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Квантовая синхронизация репозитория
        uses: actions/checkout@v4

      - name: 🐍 Развертывание среды Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 💾 Активация кэша нейросетевых компонентов (Python)
        uses: actions/cache@v4
        id: cache-neural-deps
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📦 Установка нейросетевых компонентов
        if: steps.cache-neural-deps.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔐 Подготовка локального окружения для тестов
        run: |
          echo "COLOSSEUM_COPILOT_API_BASE='https://amrita.network'" >> .env
          echo "COLOSSEUM_COPILOT_PAT='CI_TEST_TOKEN'" >> .env
          echo "DISCORD_WEBHOOK_URL='https://discord.com'" >> .env
          echo "TELEGRAM_BOT_TOKEN='123456:CI_TEST_TOKEN'" >> .env
          echo "TELEGRAM_CHAT_ID='-100123456'" >> .env

      - name: 🚀 Автономный запуск ИИ-тестов Монады Амриты
        run: |
          source .venv/bin/activate
          echo "--- ЗАПУСК ФИЛЬТРА ФЕЙКЕРА, ОКА БАБАТЫ И МОСТОВ ДИСКОРД/ТЕЛЕГРАМ ---"
          python src/meme_filter.py
          python src/atman_field_manifest.py
          python src/discord_webhook_sync.py
          python src/solana_robotics_stream.py
          python src/peaq_qnt_bridge.py
          python src/robotics_parser.py
          echo "--- ПОЛНЫЙ ЦИКЛ АВТОНОМНОГО ВЗАИМОДЕЙСТВИЯ УСПЕШНО СИНХРОНИЗИРОВАН ---"
