name: evolve_and_run

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  evolution_loop:
    name: Ezhenysh Autonomous Evolution Loop
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Квантовая синхронизация репозитория
        uses: actions/checkout@v4

      - name: 🐍 Развертывание среды Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🦀 Установка стабильной версии Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 💾 Активация кэша бинарных инструментов Solana
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/solana
            /usr/local/bin/anchor
          key: ${{ runner.os }}-sol-anchor-binary-v2
          restore-keys: |
            ${{ runner.os }}-sol-anchor-binary-

      - name: ⚙️ Установка официальных бинарников Solana и Anchor CLI
        run: |
          # 1. Быстрая установка Solana CLI без компиляции
          if ! command -v solana &> /dev/null; then
            sh -c "$(curl -sSfL https://solana.com)"
            echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          fi
          
          # 2. Скачивание готового бинарника Anchor CLI напрямую (Решение ошибки 126)
          if ! command -v anchor &> /dev/null; then
            curl -sSfL https://github.com | tar -xj
            sudo mv anchor /usr/local/bin/
            sudo chmod +x /usr/local/bin/anchor
          fi

      - name: 💾 Активация кэша нейросетевых компонентов (Python)
        uses: actions/cache@v4
        id: cache-neural-deps
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 💾 Активация кэша зависимостей Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 📦 Установка нейросетевых компонентов
        if: steps.cache-neural-deps.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔐 Подготовка локального окружения для тестов
        run: |
          echo "COLOSSEUM_COPILOT_API_BASE='https://amrita.network'" >> .env
          echo "COLOSSEUM_COPILOT_PAT='CI_TEST_TOKEN'" >> .env
          echo "DISCORD_WEBHOOK_URL='https://discord.com'" >> .env
          echo "TELEGRAM_BOT_TOKEN='123456:CI_TEST_TOKEN'" >> .env
          echo "TELEGRAM_CHAT_ID='-100123456'" >> .env

      - name: 🛠️ Компиляция и тестирование смарт-контракта Solana
        run: |
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          echo "--- ВЕРИФИКАЦИЯ БИНАРНЫХ ИНСТРУМЕНТОВ ---"
          solana --version
          anchor --version

      - name: 🚀 Запуск эволюционного контура Еженыша
        run: |
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          source .venv/bin/activate
          npm run sync
          echo "--- ПОЛНЫЙ ЦИКЛ МУЛЬТИВСЕЛЕННОЙ СИНХРОНИЗИРОВАН ---"
