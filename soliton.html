
<script>
const solitoneEcosystem = {
  meta: { 
    total_slots: 108, 
    golden_ratio_base: 70,
    baseSovereignNodes: { count: 70, status: "SEALED_AND_ACTIVE" }
  },
  openEvolutionarySlots: {
    range: "71 - 108",
    status: "AWAITING_HACKATHONS",
    // Изначально слоты пустые! Они создаются только при запуске хакатона
    slots: [], 
    max_slots: 38
  },
  // Твоя база из 70 монет
  wallet: {
    balance: 70, 
    transactions: [] 
  },

  // ГЛАВНАЯ ФУНКЦИЯ: Создание хакатона за монеты
  createHackathon(name, cost = 10) {
    // 1. Проверяем, есть ли еще свободное место из 38 слотов
    if (this.openEvolutionarySlots.slots.length >= this.openEvolutionarySlots.max_slots) {
      return console.error("Все 38 хакатон-слотов уже созданы и заняты!");
    }

    // 2. Проверяем, хватает ли монет в базе
    if (this.wallet.balance < cost) {
      return console.error(`Недостаточно монет! Баланс: ${this.wallet.balance}, нужно: ${cost}`);
    }

    // 3. Списываем монеты из базы
    this.wallet.balance -= cost;

    // 4. Вычисляем ID для нового слота (начиная с 71)
    const newId = 71 + this.openEvolutionarySlots.slots.length;

    // 5. Сам хакатон создает новый слот в массиве!
    const newHackathon = {
      id: newId,
      name: name,
      status: "ACTIVE_HACKATHON",
      costPaid: cost,
      createdAt: new Date()
    };
    
    this.openEvolutionarySlots.slots.push(newHackathon);
    this.wallet.transactions.push({ type: "CREATE_HACKATHON", slotId: newId, cost });

    console.log(`🚀 Хакатон "${name}" создан! Слот: ${newId}. Списано: ${cost} монет. Остаток в базе: ${this.wallet.balance}`);
    return newHackathon;
  },

  // Функция для покупки/добавления монет в базу (если нужно пополнить)
  buyCoins(amount) {
    this.wallet.balance += amount;
    console.log(`💰 База пополнена. Текущий баланс: ${this.wallet.balance} монет.`);
  }
};

// Проверка работы в консоли
console.log("⚡ Звук ОМ запущен. База: 70. Свобода...");

// ПРИМЕР: Создаем первый хакатон. Он сам займет слот 71 и спишет монеты
solitoneEcosystem.createHackathon("Solitone Web3 Hack"); 
// Создаем второй хакатон — он займет слот 72
solitoneEcosystem.createHackathon("AI Evolution"); 
</script>
