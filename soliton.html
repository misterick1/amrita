<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMRITA MIR — Turbine XDP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #05020a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            position: relative;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .container {
            z-index: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 90vh;
            width: 100%;
            padding: 10px;
        }
        .badge {
            background: linear-gradient(90deg, #ff0055, #cc00ff);
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 2px;
            padding: 6px 16px;
            border-radius: 20px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }
        h1 {
            font-size: 2.2rem;
            color: #00ffcc;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }
        .description {
            font-size: 0.85rem;
            color: #a3a3c2;
            max-width: 320px;
            line-height: 1.4;
        }
        .soliton-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sphere {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ffcc, #cc00ff, #ff0055);
            background-size: 200% 200%;
            box-shadow: 0 0 40px #ff0055, 0 0 80px #cc00ff, inset 0 0 20px rgba(255,255,255,0.4);
            animation: pulse 2s infinite ease-in-out, morph 4s infinite ease-in-out, bgShift 3s infinite linear;
        }
        .number {
            position: relative;
            font-size: 3.5rem;
            font-weight: bold;
            color: #ffffff;
            z-index: 2;
            text-shadow: 0 0 20px #00ffcc;
            user-select: none;
        }
        .btn-connect {
            background: transparent;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }
        .btn-connect:hover {
            background: #00ffcc;
            color: #05020a;
            box-shadow: 0 0 25px #00ffcc;
        }
        .footer-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .footer-title { font-size: 1.1rem; font-weight: 600; letter-spacing: 1px; color: #fff; }
        .footer-sub { font-size: 0.75rem; color: #6e6e8c; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
        @keyframes morph { 0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; } 50% { border-radius: 55% 45% 45% 55% / 55% 55% 45% 45%; } }
        @keyframes bgShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>

    <canvas id="quantumGrid"></canvas>

    <div class="container">
        <div class="badge">Turbine XDP Active (0.8ms)</div>
        <div>
            <h1>AMRITA MIR</h1>
            <p class="description">Единый Солитон. Синергетический рой Web3-ускорения.</p>
        </div>

        <div class="soliton-container">
            <div class="sphere"></div>
            <div class="number">108</div>
        </div>

        <button class="btn-connect" onclick="connectPhantom()">Connect Phantom</button>

        <div class="footer-block">
            <div class="footer-title">Digital Energy Reserve</div>
            <div class="footer-sub">Solana Tech Agave 4.0 Infrastructure</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('quantumGrid');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                // Сверхскоростной поток Turbine
                this.speedX = (Math.random() - 0.5) * 4;
                this.speedY = (Math.random() - 0.5) * 4;
                this.color = Math.random() > 0.4 ? '#00ffcc' : '#ff0055';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Генерируем 50 реактивных частиц
        for (let i = 0; i < 50; i++) { particles.push(new Particle()); }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        function connectPhantom() {
            if ('solana' in window) {
                window.solana.connect()
                    .then(res => alert('Подключено: ' + res.publicKey.toString()))
                    .catch(err => console.log(err));
            } else {
                alert('Открой этот сайт внутри приложения Phantom!');
            }
        }
    </script>
</body>
</html>
