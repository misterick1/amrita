<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMRITA MIR</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #05020a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; text-align: center; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container { z-index: 1; position: relative; }
        h1 { color: #00ffcc; font-size: 2.5rem; text-shadow: 0 0 15px #00ffcc; margin-bottom: 20px; }
        .soliton { width: 200px; height: 200px; background: linear-gradient(45deg, #cc00ff, #ff0055); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 30px auto; font-size: 3.5rem; font-weight: bold; box-shadow: 0 0 50px #ff0055; animation: pulse 3s infinite; }
        .btn { background: transparent; border: 2px solid #00ffcc; color: #00ffcc; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>
    <canvas id="quantumGrid"></canvas>
    <div class="container">
        <h1>AMRITA MIR</h1>
        <div class="soliton">108</div>
        <button class="btn" onclick="connect()">Connect Phantom</button>
    </div>
    <script>
        const canvas = document.getElementById('quantumGrid'); const ctx = canvas.getContext('2d'); let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } window.addEventListener('resize', resize); resize();
        class P { constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*3+1; this.sx = Math.random()-0.5; this.sy = Math.random()-0.5; } update() { this.x+=this.sx; this.y+=this.sy; if(this.x>canvas.width||this.x<0)this.sx*=-1; if(this.y>canvas.height||this.y<0)this.sy*=-1; } draw() { ctx.fillStyle = Math.random()>0.5?'#00ffcc':'#ff0055'; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); } }
        for(let i=0;i<30;i++){particles.push(new P());}
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(anim); } anim();
        function connect() { if('solana' in window){window.solana.connect().then(r=>alert('Done!')).catch(e=>alert('Err'));}else{alert('Install Phantom');} }
    </script>
</body>
</html>
