
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMRITA MIR — Единый Глобальный Солитон</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0713;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
            padding: 20px;
        }
        .badge {
            background: #ff0055;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 2px;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        h1 {
            font-size: 2.5rem;
            color: #00ffcc;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        .description {
            font-size: 1rem;
            color: #b3b3cc;
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .soliton-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }
        .sphere {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(45deg, #cc00ff, #ff0055);
            box-shadow: 0 0 40px #cc00ff, 0 0 80px #ff0055, inset 0 0 20px rgba(255,255,255,0.3);
            animation: pulse 4s infinite ease-in-out, morph 8s infinite ease-in-out;
            z-index: 1;
        }
        .number {
            position: relative;
            font-size: 4rem;
            font-weight: bold;
            color: #00ffcc;
            z-index: 2;
            text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc;
            user-select: none;
        }
        .footer-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .footer-sub {
            font-size: 0.85rem;
            color: #8c8ca3;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px #cc00ff, 0 0 80px #ff0055; }
            50% { transform: scale(1.06); box-shadow: 0 0 60px #ff0055, 0 0 110px #00ffcc; }
        }
        @keyframes morph {
            0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; }
            33% { border-radius: 70% 30% 52% 48% / 60% 40% 60% 40%; }
            66% { border-radius: 50% 50% 30% 70% / 40% 60% 40% 60%; }
        }
    </style>
</head>
<body>

    <div class="badge">Colosseum Solana Global</div>
    <h1>AMRITA MIR</h1>
    <p class="description">Единый глобальный Солитон. Великое объединение всей крипты, всех существующих блокчейнов и веб-браузеров в неделимый синергетический рой.</p>

    <div class="soliton-container">
        <div class="sphere"></div>
        <div class="number">108</div>
    </div>

    <div class="footer-title">Digital Energy Reserve</div>
    <div class="footer-sub">Экосистема тотального доминирования Web3</div>

</body>
</html>
