<script>
function playCosmicSound(isSuccess = true) {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') return;
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
    if (isSuccess) {
      oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15);
      gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.2);
    } else {
      oscillator.type = 'sawtooth'; oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.3);
    }
  } catch (e) { console.log("Звук заблокирован"); }
}

function showWeb3Toast(message) {
  const toast = document.getElementById('web3-toast'); toast.innerHTML = message; toast.style.display = 'block';
  setTimeout(() => { toast.style.opacity = '1'; toast.style.transform = 'translateY(0)'; }, 10);
  setTimeout(() => {
    toast.style.opacity = '0'; toast.style.transform = 'translateY(20px)';
    setTimeout(() => { toast.style.display = 'none'; }, 300);
  }, 3500);
}

const solitoneEcosystem = {
  meta: { total_slots: 108, golden_ratio_base: 70, baseSovereignNodes: { count: 70, status: "SEALED_AND_ACTIVE" } },
  openEvolutionarySlots: { range: "71 - 108", status: "AWAITING_HACKATHONS", slots: [], max_slots: 38 },
  wallet: { balance: 70, transactions: [] },
  chartData: [], 

  saveToStorage() {
    localStorage.setItem('solitone_balance', this.wallet.balance);
    localStorage.setItem('solitone_slots', JSON.stringify(this.openEvolutionarySlots.slots));
    localStorage.setItem('solitone_txs', JSON.stringify(this.wallet.transactions));
    localStorage.setItem('solitone_chart', JSON.stringify(this.chartData));
  },

  loadFromStorage() {
    const savedBalance = localStorage.getItem('solitone_balance');
    const savedSlots = localStorage.getItem('solitone_slots');
    const savedTxs = localStorage.getItem('solitone_txs');
    const savedChart = localStorage.getItem('solitone_chart');
    if (savedBalance !== null) this.wallet.balance = parseInt(savedBalance, 10);
    if (savedSlots !== null) this.openEvolutionarySlots.slots = JSON.parse(savedSlots);
    if (savedTxs !== null) this.wallet.transactions = JSON.parse(savedTxs);
    if (savedChart !== null && savedChart !== "") { 
      this.chartData = JSON.parse(savedChart); 
    } else { 
      this.chartData = [{height:40,isUp:true},{height:55,isUp:true},{height:50,isUp:false}]; 
    }
    this.updateUI();
  },

  addCandle(height, isUp = true) {
    this.chartData.push({ height: Math.min(Math.max(height, 10), 100), isUp: isUp });
    if (this.chartData.length > 25) this.chartData.shift();
    this.saveToStorage();
  },

  addLog(msg) {
    const timestamp = new Date().toLocaleTimeString();
    this.wallet.transactions.unshift(`[${timestamp}] ${msg}`);
    if (this.wallet.transactions.length > 25) this.wallet.transactions.pop();
    this.saveToStorage();
  },

  updateUI() {
    document.getElementById('coin-balance').innerText = this.wallet.balance;
    
    const currentSlotsCount = this.openEvolutionarySlots.slots.length;
    document.getElementById('slots-count').innerText = currentSlotsCount;
    const percent = (currentSlotsCount / this.openEvolutionarySlots.max_slots) * 100;
    const bar = document.getElementById('slots-progress-bar');
    if (bar) bar.style.width = percent + '%';
    
    const hContainer = document.getElementById('hackathons-container');
    if (hContainer) {
      hContainer.innerHTML = '';
      this.openEvolutionarySlots.slots.forEach((h, index) => {
        const card = document.createElement('div');
        card.className = 'hackathon-card';
        const progPercent = ((60 - h.timeLeft) / 60) * 100;
        card.innerHTML = `
          <div>
            <strong style="color: #00ffcc;">🚀 ${h.name}</strong><br>
            <span style="font-size: 11px; color: #b3a3d4;">Осталось: ${h.timeLeft}с | Доход: +5 $BEE</span>
            <div class="card-progress-bg">
                <div class="card-progress-bar" style="width: ${progPercent}%"></div>
            </div>
          </div>
          <button class="delete-btn" onclick="triggerDeleteHackathon(${index})">❌</button>
        `;
        hContainer.appendChild(card);
      });
    }
    
    const logBox = document.getElementById('transactions-log');
    if (logBox) {
      if (this.wallet.transactions.length === 0) {
        logBox.innerHTML = 'Пока транзакций не было.';
      } else {
        logBox.innerHTML = this.wallet.transactions.join('<br>');
      }
    }
    
    const chartBox = document.getElementById('crypto-chart');
    if (chartBox) {
      chartBox.innerHTML = '';
      this.chartData.forEach(c => {
        const candle = document.createElement('div');
        candle.className = 'candle';
        candle.style.height = c.height + 'px';
        candle.style.backgroundColor = c.isUp ? '#00ffcc' : '#ff3366';
        candle.style.boxShadow = c.isUp ? '0 0 8px rgba(0,255,204,0.4)' : '0 0 8px rgba(255,51,102,0.4)';
        chartBox.appendChild(candle);
      });
      chartBox.scrollLeft = chartBox.scrollWidth;
    }
  }
};

function triggerCreate() {
  const input = document.getElementById('hackathon-name-input');
  let name = input.value.trim();
  if (!name) name = `Хакатон #${solitoneEcosystem.openEvolutionarySlots.slots.length + 1}`;
  
  if (solitoneEcosystem.wallet.balance < 1) {
    playCosmicSound(false);
    showWeb3Toast('❌ Ошибка: Недостаточно \$BEE в Базе Роя!');
    return;
  }
  if (solitoneEcosystem.openEvolutionarySlots.slots.length >= solitoneEcosystem.openEvolutionarySlots.max_slots) {
    playCosmicSound(false);
    showWeb3Toast('❌ Превышен лимит доступных слотов хакатонов!');
    return;
  }
  
  solitoneEcosystem.wallet.balance -= 1;
  solitoneEcosystem.openEvolutionarySlots.slots.push({
      name: name,
      timeLeft: 60
  });
  solitoneEcosystem.addLog(`Списан 1 $BEE. Запущен хакатон: ${name} (Таймер: 60с)`);
  
  input.value = '';
  playCosmicSound(true);
  showWeb3Toast('🚀 Хакатон успешно запущен!');
  solitoneEcosystem.saveToStorage();
  solitoneEcosystem.updateUI();
}

function triggerDeleteHackathon(index) {
  const h = solitoneEcosystem.openEvolutionarySlots.slots[index];
  if (confirm(`Вы действительно хотите принудительно закрыть хакатон "${h.name}" без выплаты наград?`)) {
    solitoneEcosystem.openEvolutionarySlots.slots.splice(index, 1);
    solitoneEcosystem.addLog(`Хакатон принудительно остановлен: ${h.name}`);
    playCosmicSound(false);
    showWeb3Toast('🧹 Хакатон удален.');
    solitoneEcosystem.saveToStorage();
    solitoneEcosystem.updateUI();
  }
}

function triggerBuy() {
  solitoneEcosystem.wallet.balance += 10;
  solitoneEcosystem.addLog('База Роя пополнена: +10 \$BEE.');
  playCosmicSound(true);
  showWeb3Toast('💰 База Роя успешно пополнена на 10 \$BEE!');
  solitoneEcosystem.saveToStorage();
  solitoneEcosystem.updateUI();
}

function triggerCleanup() {
  solitoneEcosystem.addLog('Cleanup SZN: Очистка кэша структур и дефрагментация.');
  playCosmicSound(true);
  showWeb3Toast('🧹 Очистка сезона (Cleanup SZN) успешно выполнена!');
  solitoneEcosystem.updateUI();
}

function triggerBurnCoins() {
  if (solitoneEcosystem.wallet.balance <= 0) {
    playCosmicSound(false);
    showWeb3Toast('❌ Невозможно произвести сжигание при балансе 0.');
    return;
  }
  const burnAmount = Math.ceil(solitoneEcosystem.wallet.balance * 0.3);
  solitoneEcosystem.wallet.balance -= burnAmount;
  solitoneEcosystem.addLog(`🔥 Уничтожено ${burnAmount} $BEE посредством сжигания. Памп запущен!`);
  playCosmicSound(true);
  showWeb3Toast(`🔥 Сожжено ${burnAmount} $BEE! Квантовый памп запущен!`);
  
  for(let i = 0; i < 6; i++) {
    setTimeout(() => {
      solitoneEcosystem.addCandle(Math.floor(Math.random() * 30) + 70, true);
      solitoneEcosystem.updateUI();
    }, i * 150);
  }
  solitoneEcosystem.saveToStorage();
  solitoneEcosystem.updateUI();
}

function triggerTransfer() {
  const nodeInput = document.getElementById('transfer-node-input');
  const amountInput = document.getElementById('transfer-amount-input');
  const node = nodeInput.value.trim();
  const amount = parseInt(amountInput.value, 10);
  
  if (!node || isNaN(amount) || amount <= 0) {
    playCosmicSound(false);
    showWeb3Toast('❌ Проверьте правильность ID Узла и суммы монет!');
    return;
  }
  if (solitoneEcosystem.wallet.balance < amount) {
    playCosmicSound(false);
    showWeb3Toast('❌ Запрошенный трансфер превышает текущий баланс!');
    return;
  }
  
  solitoneEcosystem.wallet.balance -= amount;
  solitoneEcosystem.addLog(`Трансфер: ${amount} $BEE отправлены на узел [${node}].`);
  
  nodeInput.value = '';
  amountInput.value = '';
  playCosmicSound(true);
  showWeb3Toast(`🔄 Перевод выполнен.`);
  solitoneEcosystem.saveToStorage();
  solitoneEcosystem.updateUI();
}

function triggerReset() {
  if (confirm('Вы уверены, что хотите полностью стереть локальные матрицы данных?')) {
    localStorage.clear();
    solitoneEcosystem.wallet.balance = 70;
    solitoneEcosystem.openEvolutionarySlots.slots = [];
    solitoneEcosystem.wallet.transactions = [];
    solitoneEcosystem.chartData = [{height:40,isUp:true},{height:55,isUp:true},{height:50,isUp:false}];
    playCosmicSound(false);
    showWeb3Toast('🔄 Локальное хранилище очищено. Базы сброшены.');
    solitoneEcosystem.saveToStorage();
    solitoneEcosystem.updateUI();
  }
}
