<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Quantum Matrix: Devanagari Omniverse</title>
<style>
body {
    margin: 0;
    padding: 20px;
    font-family: sans-serif;
    background: #050508;
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
header {
    width: 100%;
    max-width: 600px;
    text-align: center;
    margin-bottom: 20px;
}
h1 {
    font-size: 15px;
    text-transform: uppercase;
    background: linear-gradient(45deg, #00ffcc, #f7931a, #9945FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
}
.container {
    width: 100%;
    max-width: 600px;
    background: #0b0717;
    padding: 20px;
    border-radius: 12px;
    box-sizing: border-box;
    margin-bottom: 15px;
    border: 1px solid #331155;
}
.quantum-field-title {
    font-size: 11px;
    color: #00ffcc;
    text-transform: uppercase;
    margin-bottom: 10px;
    letter-spacing: 2px;
    font-weight: bold;
}
.network-badges {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
    overflow-x: auto;
    padding-bottom: 5px;
}
.badge {
    background: #140d24;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-family: monospace;
    border: 1px solid #442266;
    color: #a099b0;
}
.badge.active {
    color: #fff;
    border-color: #00ffcc;
    box-shadow: 0 0 8px rgba(0,255,204,0.3);
}
.mode-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 15px;
}
.mode-btn {
    background: #140d24;
    color: #a099b0;
    border: 1px solid #442266;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    text-align: center;
}
.mode-btn.active {
    border-color: #ffcc00;
    color: #fff;
    box-shadow: 0 0 10px rgba(255, 204, 0, 0.4);
}
.quantum-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    background: #030207;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #9945FF;
}
.quantum-cell {
    background: #140d24;
    padding: 12px;
    text-align: center;
    font-family: serif;
    font-size: 18px;
    border-radius: 4px;
    color: #2b1a4a;
    transition: all 0.05s ease;
}
.quantum-cell.active {
    background: #ffcc00;
    color: #000;
    box-shadow: 0 0 12px #ffcc00;
    font-weight: bold;
}
.quantum-cell.sync {
    background: #00ffcc;
    color: #000;
    box-shadow: 0 0 15px #00ffcc;
    font-weight: bold;
}
.crypto-key-panel {
    background: #030207;
    padding: 12px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 12px;
    color: #00ffcc;
    word-break: break-all;
    border: 1px solid #331155;
    margin-top: 5px;
}
</style>
</head>
<body>

<header>
<h1>UNIFIED DEVANAGARI OMNIVERSE</h1>
</header>

<div class="container">
<div class="quantum-field-title">Статус Единых Проекций Системы</div>
<!-- Все блокчейны параллельно в одной панели -->
<div class="network-badges">
<div class="badge active" id="b-sol">SOLANA</div>
<div class="badge active" id="b-btc">BITCOIN</div>
<div class="badge active" id="b-eth">ETHEREUM</div>
<div class="badge active" id="b-xrp">XRP</div>
<div class="badge active" id="b-ada">CARDANO</div>
</div>

<div class="quantum-field-title">Квантовое Состояние Единого Поля</div>
<div class="mode-selector">
<div class="mode-btn active" id="m-sep" onclick="setMode('SEPARATE')">◯ Автономия</div>
<div class="mode-btn" id="m-sync" onclick="setMode('SYNC')">△ Конвергенция</div>
<div class="mode-btn" id="m-om" onclick="setMode('OM')">☐ Единый Язык ॐ</div>
</div>
</div>

<div class="container">
<div class="quantum-field-title">МАТРИЦА СЛИЯНИЯ СЕТЕЙ (DEVANAGARI CUBITS)</div>
<div class="quantum-grid" id="quantum-grid"></div>
</div>

<div class="container">
<div class="quantum-field-title">Единый Код Всех Блокчейнов (Мульти-Хэш)</div>
<div class="crypto-key-panel" id="omni-key">Синхронизация единого алфавита...</div>
</div>

<script>
window.onerror = function(msg, url, line) {
    let d = document.createElement('div');
    d.style = "position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:9999;padding:15px;box-sizing:border-box;font-family:monospace;";
    d.innerText = "Ошибка: " + msg + " | Строка: " + line;
    document.body.appendChild(d);
    return false;
};

const systemState = {
    mode: 'SEPARATE',
    pulseCount: 0
};

// Алфавит Деванагари + Квантовые Метки Токенов сетей
const devanagariMatrix = ["अ", "ब", "क", "म", "य", "श", "र", "त", "न", "ज", "ह", "वि", "ॐ", "BTC", "ETH", "SOL"];
let quantumField = Array(16).fill(0);

function setMode(newMode) {
    systemState.mode = newMode;
    document.getElementById('m-sep').className = 'mode-btn';
    document.getElementById('m-sync').className = 'mode-btn';
    document.getElementById('m-om').className = 'mode-btn';
    
    if(newMode === 'SEPARATE') document.getElementById('m-sep').className = 'mode-btn active';
    if(newMode === 'SYNC') document.getElementById('m-sync').className = 'mode-btn active';
    if(newMode === 'OM') document.getElementById('m-om').className = 'mode-btn active';
    
    updateMatrix();
}

function updateMatrix() {
    for (let i = 0; i < 16; i++) {
        quantumField[i] = Math.random() > 0.55 ? 1 : 0;
    }
    systemState.pulseCount++;
    renderUI();
}

function generateOmniKey(length) {
    let result = "";
    // Алфавит знаков Base58 смешивается с Деванагари в Едином цифровом поле
    let combinedAlphabet = "123456789ABCDEFGHJKLMNPQRSTUVWXYZअबकमयरतॐ";
    for (let i = 0; i < length; i++) {
        let idx = Math.floor(Math.random() * combinedAlphabet.length);
        result += combinedAlphabet[idx];
    }
    return result;
}

function renderUI() {
    let grid = document.getElementById('quantum-grid');
    if (!grid) return;
    
    grid.innerHTML = '';
    for (let i = 0; i < 16; i++) {
        let cell = document.createElement('div');
        let currentSymbol = devanagariMatrix[i % devanagariMatrix.length];
        
        if (quantumField[i] === 1) {
            if (systemState.mode === 'SEPARATE') {
                cell.className = 'quantum-cell active';
                cell.innerText = currentSymbol;
            } else if (systemState.mode === 'SYNC') {
                cell.className = 'quantum-cell sync';
                cell.innerText = currentSymbol;
            } else {
                cell.className = 'quantum-cell sync';
                cell.style.background = 'linear-gradient(45deg, #ffcc00, #9945FF)';
                cell.style.color = '#000';
                cell.innerText = 'ॐ'; // Полный коллапс в единый сакральный код
            }
        } else {
            cell.className = 'quantum-cell';
            cell.innerText = '•';
        }
        grid.appendChild(cell);
    }

    let keyEl = document.getElementById('omni-key');
    if (keyEl) {
        let keyLength = systemState.mode === 'OM' ? 24 : 32;
        let prefix = systemState.mode === 'OM' ? "🌌 [OMNIVERSE_ONE]: " : "🔗 [MULTICHEN_SYNC]: ";
        keyEl.innerText = prefix + generateOmniKey(keyLength);
    }
}

window.onload = function() {
    updateMatrix();
    // Тактовая частота Solana (~400мс) запускает и просчитывает всю Матрицу сетей вместе
    setInterval(updateMatrix, 400);
};
</script>
</body>
</html>
