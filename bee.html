<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMRITA MIR CONTROL PANEL</title>
    <style>
        body {
            background-color: #06070a;
            color: #c5c6c7;
            font-family: 'Courier New', monospace;
            padding: 10px;
            margin: 0;
        }
        .control-panel-cyber {
            background-color: #0b0c10;
            max-width: 650px;
            margin: 20px auto;
            padding: 20px;
            border: 2px solid #1f2833;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(31, 40, 51, 0.5);
        }
        h1 {
            color: #45f3ff;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #1f2833;
            padding-bottom: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .stat-card {
            background: #151a23;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #45f3ff;
        }
        .stat-label {
            font-size: 12px;
            color: #66fcf1;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            margin-top: 5px;
        }
        .btn-action {
            display: block;
            width: 100%;
            background: transparent;
            color: #45f3ff;
            border: 1px solid #45f3ff;
            padding: 12px;
            margin-top: 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .btn-action:hover {
            background: #45f3ff;
            color: #06070a;
            box-shadow: 0 0 15px #45f3ff;
        }
    </style>
</head>
<body>

    <div class="control-panel-cyber">
        <h1>Amrita Mir System</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Bonding Curve</div>
                <div class="stat-value">100%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Status</div>
                <div class="stat-value" style="color: #00ffcc;">MIGRATED</div>
            </div>
        </div>

        <button class="btn-action">Execute Control</button>
    </div>

</body>
</html>
