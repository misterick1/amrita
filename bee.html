<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sovereign Matrix: Math As Art 21.0</title>
<style>
body {
    margin: 0;
    padding: 20px;
    font-family: sans-serif;
    background: #000000;
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
header {
    width: 100%;
    max-width: 600px;
    text-align: center;
    margin-bottom: 15px;
}
h1 {
    font-size: 13px;
    text-transform: uppercase;
    background: linear-gradient(45deg, #00ffcc, #ff00ff, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
}
.container {
    width: 100%;
    max-width: 600px;
    background: #05040d;
    padding: 15px;
    border-radius: 12px;
    box-sizing: border-box;
    margin-bottom: 15px;
    border: 1px solid #1a0c30;
}
.quantum-field-title {
    font-size: 10px;
    color: #00ffcc;
    text-transform: uppercase;
    margin-bottom: 10px;
    letter-spacing: 2px;
    font-weight: bold;
}
.status-panel {
    padding: 12px;
    background: #010004;
    border-radius: 6px;
    border-left: 4px solid #00ffcc;
    font-family: monospace;
    font-size: 11px;
    line-height: 1.6;
}
/* Холст для математического искусства */
#soliton-canvas {
    width: 100%;
    height: 250px;
    background: #000000;
    border-radius: 8px;
    margin-bottom: 10px;
    border: 1px solid #1a0c30;
}
.quantum-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    background: #000000;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #9945FF;
}
.quantum-cell {
    background: #0b0517;
    padding: 12px;
    text-align: center;
    font-family: serif;
    font-size: 18px;
    border-radius: 4px;
    color: #1f0f3d;
    transition: all 0.05s ease;
}
.quantum-cell.active-wave {
    background: #00ffcc;
    color: #000000;
    box-shadow: 0 0 14px #00ffcc;
}
.quantum-cell.active-om {
    background: linear-gradient(45deg, #ff00ff, #ffffff);
    color: #000000;
    box-shadow: 0 0 18px #ff00ff;
    font-weight: bold;
}
.crypto-key-panel {
    background: #010004;
    padding: 12px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 11px;
    color: #a099b0;
    word-break: break-all;
    border: 1px solid #1a0c30;
}
</style>
</head>
<body>

<header>
<h1>OMNI-MATRIX: WHEN MATH BECOMES ART</h1>
</header>

<!-- Блок Солитонного Круга со скриншота -->
<div class="container">
<div class="quantum-field-title">Геометрия Пространства Солитона (M = 21.0)</div>
<canvas id="soliton-canvas"></canvas>
<div class="status-panel">
<div style="color: #00ffcc; font-weight: bold;">Текущий Резонанс: M = 21.0 (Полная определённость)</div>
<div style="color: #ffffff;">Связи: Простые правила порождают Блокчейн Мыслей.</div>
</div>
</div>

<div class="container">
<div class="quantum-field-title">МАТРИЦА СХЛОПЫВАНИЯ ЛИНИЙ (ДЕВАНАГАРИ)</div>
<div class="quantum-grid" id="quantum-grid"></div>
</div>

<div class="container">
<div class="quantum-field-title">Суверенный Фрактальный Хэш Кода</div>
<div class="crypto-key-panel" id="omni-key">Вращение Ленты Мёбиуса...</div>
</div>

<script>
window.onerror = function(msg, url, line) {
    return false;
};

const matrixCore = {
    mFactor: 21.0,
    pulseSpeed: 400,
    angle: 0
};

const devanagariOmni = ["अ", "ब", "क", "म", "य", "श", "र", "त", "₿", "1", "0", "ॐ"];
let quantumField = Array(16).fill(0);
let fieldRoles = Array(16).fill('empty');

// Функция отрисовки геометрии круга M = 21.0 со скриншота
function drawMathArt() {
    const canvas = document.getElementById('soliton-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    
    // Подгоняем внутреннее разрешение под размер элемента
    if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
    }
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const radius = Math.min(centerX, centerY) - 20;
    const totalPoints = 60; // Количество узлов на окружности
    
    matrixCore.angle += 0.02; // Движение узора
    
    ctx.lineWidth = 1;
    // Отрисовка переплетенных линий фрактала
    for (let i = 0; i < totalPoints; i++) {
        let a1 = (i * 2 * Math.PI) / totalPoints + matrixCore.angle;
        let x1 = centerX + radius * Math.cos(a1);
        let y1 = centerY + radius * Math.sin(a1);
        
        // Шаг умножения линий по индексу М = 21
        let targetIdx = (i * Math.floor(matrixCore.mFactor)) % totalPoints;
        let a2 = (targetIdx * 2 * Math.PI) / totalPoints + matrixCore.angle;
        let x2 = centerX + radius * Math.cos(a2);
        let y2 = centerY + radius * Math.sin(a2);
        
        // Плавный градиент цветов от фиолетового к бирюзовому, как на картинке
        ctx.strokeStyle = `hsl(${(i * 360) / totalPoints}, 80%, 60%)`;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
    }
}

function pulseMatrix() {
    for (let i = 0; i < 16; i++) {
        if (Math.random() > 0.55) {
            quantumField[i] = 1;
            fieldRoles[i] = Math.random() > 0.7 ? 'om' : 'wave';
        } else {
            quantumField[i] = 0;
            fieldRoles[i] = 'empty';
        }
    }
    renderUI();
}

function generateFractalKey(length) {
    let alphabet = "10_₿_∞_ॐ_MATH_ART_21_SOLITON";
    let result = "";
    for (let i = 0; i < length; i++) {
        let idx = Math.floor(Math.random() * alphabet.length);
        result += alphabet[idx];
    }
    return result;
}

function renderUI() {
    let grid = document.getElementById('quantum-grid');
    if (!grid) return;
    
    grid.innerHTML = '';
    for (let i = 0; i < 16; i++) {
        let cell = document.createElement('div');
        let currentSymbol = devanagariOmni[i % devanagariOmni.length];
        
        if (quantumField[i] === 1) {
            if (fieldRoles[i] === 'wave') {
                cell.className = 'quantum-cell active-wave';
                cell.innerText = currentSymbol;
            } else {
                cell.className = 'quantum-cell active-om';
                cell.innerText = 'ॐ';
            }
        } else {
            cell.className = 'quantum-cell';
            cell.innerText = '•';
        }
        grid.appendChild(cell);
    }

    let keyEl = document.getElementById('omni-key');
    if (keyEl) {
        keyEl.innerHTML = `<div>🪐 <strong>SOLITON_MATRIX_HASH:</strong> M21_${generateFractalKey(14)}</div>
                           <div style="color: #00ffcc; margin-top:4px;">⚖️ <strong>ФРАКТАЛ:</strong> Математика стала искусством. Двигатель Сатоши чист.</div>`;
    }
}

window.onload = function() {
    pulseMatrix();
    setInterval(pulseMatrix, matrixCore.pulseSpeed);
    
    // Запуск бесконечного цикла плавной анимации круга
    function animate() {
        drawMathArt();
        requestAnimationFrame(animate);
    }
    animate();
};
</script>
</body>
</html>
