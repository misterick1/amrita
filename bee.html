<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solana Soliton Swarm: Light Code</title>
<style>
body {
    margin: 0;
    padding: 20px;
    font-family: sans-serif;
    background: linear-gradient(45deg, #0b0b0d, #14141c);
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
header {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
}
h1 {
    font-size: 18px;
    text-transform: uppercase;
    background: linear-gradient(45deg, #00ffcc, #9945FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0;
}
.container {
    width: 100%;
    max-width: 600px;
    background: #151522;
    padding: 20px;
    border-radius: 12px;
    box-sizing: border-box;
    margin-bottom: 15px;
    border: 1px solid #3a3a52;
}
.status-panel {
    margin-bottom: 15px;
    padding: 12px;
    background: #0d0d16;
    border-radius: 6px;
    border-left: 4px solid #00ffcc;
    font-family: monospace;
}
.status-panel div { margin-bottom: 6px; }
.mode-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 15px;
}
.mode-btn {
    background: #212130;
    color: #fff;
    border: 1px solid #3a3a52;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    text-align: center;
}
.mode-btn.active {
    border-color: #00ffcc;
    box-shadow: 0 0 8px rgba(0,255,204,0.3);
    font-weight: bold;
}
.quantum-field-title {
    font-size: 12px;
    color: #9945FF;
    text-transform: uppercase;
    margin-bottom: 10px;
    letter-spacing: 1px;
    font-weight: bold;
}
.quantum-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    background: #0d0d16;
    padding: 15px;
    border-radius: 8px;
    border: 1px dashed #9945FF;
}
.quantum-cell {
    background: #1c1c2b;
    padding: 12px;
    text-align: center;
    font-family: monospace;
    font-size: 14px;
    border-radius: 4px;
    color: #4a4a6a;
    transition: all 0.1s ease;
}
.quantum-cell.active {
    background: #00ffcc;
    color: #000;
    box-shadow: 0 0 10px #00ffcc;
}
.quantum-cell.edit {
    background: #ff0055;
    color: #fff;
    box-shadow: 0 0 10px #ff0055;
}
/* Стили для лога световых кодов */
.crypto-key-panel {
    background: #0d0d16;
    padding: 12px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 12px;
    color: #00ffcc;
    word-break: break-all;
    border: 1px solid #2d2d42;
    margin-top: 5px;
}
</style>
</head>
<body>

<header id="main-header">
<h1 id="app-title">SOLANA SOLITON SWARM</h1>
</header>

<div class="container">
<div class="quantum-field-title">Режим Управления (Игры в кальмара)</div>
<div class="mode-selector">
<div class="mode-btn active" id="mode-circle" onclick="setGeoMode('CIRCLE')">◯ КРУГ (Свет)</div>
<div class="mode-btn" id="mode-triangle" onclick="setGeoMode('TRIANGLE')">△ ТРЕУГОЛЬНИК (Суета)</div>
<div class="mode-btn" id="mode-square" onclick="setGeoMode('SQUARE')">☐ КВАДРАТ (Код)</div>
</div>

<div class="status-panel">
<div id="info-base">Сетевой Мост Solana: Синхронизация полей</div>
<div id="info-slots">Сгенерировано фотонов: 0</div>
<div id="info-balance">Энергия Куба: 70 $BEE</div>
</div>
</div>

<div class="container">
<div class="quantum-field-title">МАТРИЦА КУБИТОВ СОЛИТОНОВ (4D)</div>
<div class="quantum-grid" id="quantum-grid"></div>
</div>

<!-- Новый блок генерации реальных кодов -->
<div class="container">
<div class="quantum-field-title">Поток Ключей из Света и Суеты (Base58)</div>
<div class="crypto-key-panel" id="crypto-key">Генерация стартового хэша...</div>
</div>

<script>
window.onerror = function(msg, url, line) {
    let d = document.createElement('div');
    d.style = "position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:9999;padding:15px;box-sizing:border-box;font-family:monospace;";
    d.innerText = "Ошибка: " + msg + " | Строка: " + line;
    document.body.appendChild(d);
    return false;
};

const quantumNet = {
    balance: 70,
    slots: 0,
    geoMode: 'CIRCLE'
};

// Тот самый алфавит из одинаковых знаков для всех блокчейнов (Base58)
const cryptoAlphabet = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";

let quantumField = Array(16).fill(0);

function mutateQuantumField() {
    for (let i = 0; i < 16; i++) {
        quantumField[i] = Math.random() > 0.6 ? 1 : 0;
    }
    quantumNet.slots = quantumNet.slots + 1;
}

// Функция генерации строки кода на основе базовых знаков
function generateLightKey(length) {
    let result = "";
    for (let i = 0; i < length; i++) {
        let randomIndex = Math.floor(Math.random() * cryptoAlphabet.length);
        result += cryptoAlphabet[randomIndex];
    }
    return result;
}

function setGeoMode(mode) {
    quantumNet.geoMode = mode;
    document.getElementById('mode-circle').className = 'mode-btn';
    document.getElementById('mode-triangle').className = 'mode-btn';
    document.getElementById('mode-square').className = 'mode-btn';
    
    if(mode === 'CIRCLE') document.getElementById('mode-circle').className = 'mode-btn active';
    if(mode === 'TRIANGLE') document.getElementById('mode-triangle').className = 'mode-btn active';
    if(mode === 'SQUARE') document.getElementById('mode-square').className = 'mode-btn active';
    
    renderQuantumUI();
}

function renderQuantumUI() {
    let balEl = document.getElementById('info-balance');
    let slotsEl = document.getElementById('info-slots');
    
    if (balEl) { balEl.innerText = "Энергия Куба: " + quantumNet.balance + " $BEE"; }
    if (slotsEl) { slotsEl.innerText = "Сгенерировано фотонов: " + quantumNet.slots; }

    let grid = document.getElementById('quantum-grid');
    if (grid) {
        grid.innerHTML = '';
        for (let i = 0; i < 16; i++) {
            let cell = document.createElement('div');
            if (quantumField[i] === 1) {
                if (quantumNet.geoMode === 'CIRCLE') {
                    cell.className = 'quantum-cell active';
                    cell.innerText = '◯';
                } else if (quantumNet.geoMode === 'TRIANGLE') {
                    cell.className = 'quantum-cell edit';
                    cell.innerText = '△';
                } else {
                    cell.className = 'quantum-cell active';
                    cell.style.background = '#9945FF';
                    cell.style.color = '#fff';
                    cell.innerText = '☐';
                }
            } else {
                cell.className = 'quantum-cell';
                cell.innerText = '•';
            }
            grid.appendChild(cell);
        }
    }

    // Выводим сгенерированный "световой код" блокчейна на экран
    let keyEl = document.getElementById('crypto-key');
    if (keyEl) {
        let prefix = quantumNet.geoMode === 'CIRCLE' ? "SOL_LIGHT_" : (quantumNet.geoMode === 'TRIANGLE' ? "SUETA_SU_ " : "CORE_3D_");
        keyEl.innerText = prefix + generateLightKey(32);
    }
}

window.onload = function() {
    mutateQuantumField();
    renderQuantumUI();
    
    // Поле и коды пульсируют со скоростью сети Solana каждые 430 миллисекунд
    setInterval(function() {
        mutateQuantumField();
        renderQuantumUI();
    }, 430);
};
</script>
</body>
</html>
