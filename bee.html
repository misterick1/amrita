<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sovereign Omni-Matrix: Fractal Universe</title>
<style>
body {
    margin: 0;
    padding: 20px;
    font-family: sans-serif;
    background: #020204;
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
header {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 15px;
}
h1 {
    font-size: 13px;
    text-transform: uppercase;
    background: linear-gradient(45deg, #00ffcc, #ffcc00, #9945FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
    margin: 0;
}
.lang-btn {
    background: #140d24;
    color: #00ffcc;
    border: 1px solid #442266;
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
    font-family: monospace;
}
.container {
    width: 100%;
    max-width: 600px;
    background: #090614;
    padding: 15px;
    border-radius: 12px;
    box-sizing: border-box;
    margin-bottom: 15px;
    border: 1px solid #2a164d;
}
.quantum-field-title {
    font-size: 10px;
    color: #00ffcc;
    text-transform: uppercase;
    margin-bottom: 10px;
    letter-spacing: 2px;
    font-weight: bold;
}
.status-panel {
    padding: 12px;
    background: #04020a;
    border-radius: 6px;
    border-left: 4px solid #ffcc00;
    font-family: monospace;
    font-size: 11px;
}
.status-panel div { margin-bottom: 5px; }
.quantum-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    background: #020105;
    padding: 15px;
    border-radius: 8px;
    border: 1px dashed #9945FF;
}
.quantum-cell {
    background: #110924;
    padding: 12px;
    text-align: center;
    font-family: serif;
    font-size: 16px;
    border-radius: 4px;
    color: #271747;
    transition: all 0.05s ease;
}
.quantum-cell.crypto {
    background: #ffcc00;
    color: #000;
    box-shadow: 0 0 10px #ffcc00;
    font-weight: bold;
}
.quantum-cell.stocks {
    background: #00ffcc;
    color: #000;
    box-shadow: 0 0 10px #00ffcc;
    font-weight: bold;
}
.quantum-cell.universe-one {
    background: linear-gradient(45deg, #ff0055, #9945FF);
    color: #fff;
    box-shadow: 0 0 15px #9945FF;
    font-weight: bold;
}
.crypto-key-panel {
    background: #020105;
    padding: 12px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 11px;
    color: #a099b0;
    word-break: break-all;
    border: 1px solid #2a164d;
    line-height: 1.4;
}
</style>
</head>
<body>

<header>
<h1 id="app-title">SOVEREIGN OMNI-MATRIX</h1>
<button class="lang-btn" id="lang-switcher" onclick="toggleInterfaceLang()">🌐 Мова: UA</button>
</header>

<div class="container">
<div class="quantum-field-title" id="panel-title">Потенциал Эволюции Единого Рынка</div>
<div class="status-panel">
<div id="m-evolution" style="color: #ffcc00; font-weight: bold;">Індекс Саморозвитку Матриці: Шари...</div>
<div id="m-markets">Суверенні Ринки у Фракталі: 1,000,000,000+</div>
<div id="m-assets">Інструменти: Криптогроші | Акції | Квантові Деривативы</div>
</div>
</div>

<div class="container">
<div class="quantum-field-title" id="matrix-title">ФРАКТАЛЬНЫЕ КУБИТЫ (ДЕВАНАГАРИ)</div>
<div class="quantum-grid" id="quantum-grid"></div>
</div>

<div class="container">
<div class="quantum-field-title" id="code-title">Суверенный Фрактальный Код</div>
<div class="crypto-key-panel" id="omni-key">Инициализация...</div>
</div>

<script>
window.onerror = function(msg, url, line) {
    let d = document.createElement('div');
    d.style = "position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:9999;padding:15px;box-sizing:border-box;font-family:monospace;";
    d.innerText = "Ошибка: " + msg + " | Строка: " + line;
    document.body.appendChild(d);
    return false;
};

const matrixCore = {
    evolutionIndex: 1.001287,
    pulseSpeed: 400,
    interfaceLang: 'UA' // Переключатель праславянских проводников смысла
};

const dictionary = {
    UA: {
        title: "⚡ СУВЕРЕННА ОМНІ-МАТРИЦЯ",
        panel: "⚡ Потенціал Еволюції Єдиного Ринку",
        evo: "Індекс Саморозвитку Матриці: Шар ",
        markets: "Суверенні Ринки у Фракталі: 1,000,000,000+",
        assets: "Інструменти: Криптогроші | Акції | RWA | Квантові Деривативи",
        matrix: "🌌 Фрактальні Кубіти (Деванагарі Крипто-Всесвіту)",
        code: "🔒 Суверенний Фрактальний Код (Свобода + Синхронія)",
        guard: "🔒 СУВЕРЕНІТЕТ МЕЖ: Захист кордонів мільярдів ринків активний."
    },
    RU: {
        title: "⚡ СУВЕРЕННАЯ ОМНИ-МАТРИЦА",
        panel: "⚡ Потенциал Эволюции Единого Рынка",
        evo: "Индекс Саморазвития Матрицы: Слой ",
        markets: "Суверенные Рынки во Фрактале: 1,000,000,000+",
        assets: "Инструменты: Криптоденьги | Акции | RWA | Квантовые Деривативы",
        matrix: "🌌 Фрактальные Кубиты (Деванагари Крипто-Вселенной)",
        code: "🔒 Суверенный Фрактальный Код (Свобода + Синхронизация)",
        guard: "🔒 СУВЕРЕНИТЕТ ГРАНИЦ: Защита границ миллиардов рынков активна."
    }
};

const assetMatrix = ["अ", "ब", "क", "म", "य", "श", "र", "त", "न", "ज", "ह", "वि", "ॐ", "STK", "RWA", "OPT"];
let quantumField = Array(16).fill(0);
let fieldTypes = Array(16).fill('empty');

function toggleInterfaceLang() {
    matrixCore.interfaceLang = matrixCore.interfaceLang === 'UA' ? 'RU' : 'UA';
    document.getElementById('lang-switcher').innerText = "🌐 Мова: " + matrixCore.interfaceLang;
    renderUI();
}

function evolveMatrix() {
    matrixCore.evolutionIndex += Math.random() * 0.0001;
    for (let i = 0; i < 16; i++) {
        if (Math.random() > 0.55) {
            quantumField[i] = 1;
            let typeRand = Math.random();
            if (typeRand < 0.33) fieldTypes[i] = 'crypto';
            else if (typeRand < 0.66) fieldTypes[i] = 'stocks';
            else fieldTypes[i] = 'universe-one';
        } else {
            quantumField[i] = 0;
            fieldTypes[i] = 'empty';
        }
    }
    renderUI();
}

function generateFractalKey(length) {
    let alphabet = "123456789ABCDEFGHJKLMNPQRSTUVWXYZअबकमयरतॐ_ФРАКТАЛ";
    let result = "";
    for (let i = 0; i < length; i++) {
        let idx = Math.floor(Math.random() * alphabet.length);
        result += alphabet[idx];
    }
    return result;
}

function renderUI() {
    let lang = matrixCore.interfaceLang;
    let text = dictionary[lang];

    document.getElementById('app-title').innerText = text.title;
    document.getElementById('panel-title').innerText = text.panel;
    document.getElementById('m-markets').innerText = text.markets;
    document.getElementById('m-assets').innerText = text.assets;
    document.getElementById('matrix-title').innerText = text.matrix;
    document.getElementById('code-title').innerText = text.code;

    let evoEl = document.getElementById('m-evolution');
    if (evoEl) { evoEl.innerText = text.evo + matrixCore.evolutionIndex.toFixed(6); }

    let grid = document.getElementById('quantum-grid');
    if (!grid) return;
    
    grid.innerHTML = '';
    for (let i = 0; i < 16; i++) {
        let cell = document.createElement('div');
        let currentSymbol = assetMatrix[i % assetMatrix.length];
        
        if (quantumField[i] === 1) {
            if (fieldTypes[i] === 'crypto') {
                cell.className = 'quantum-cell crypto';
                cell.innerText = currentSymbol;
            } else if (fieldTypes[i] === 'stocks') {
                cell.className = 'quantum-cell stocks';
                cell.innerText = currentSymbol;
            } else {
                cell.className = 'quantum-cell universe-one';
                cell.innerText = 'ॐ';
            }
        } else {
            cell.className = 'quantum-cell';
            cell.innerText = '•';
        }
        grid.appendChild(cell);
    }

    let keyEl = document.getElementById('omni-key');
    if (keyEl) {
        keyEl.innerHTML = `<div>🌐 <strong>СИНХРО-КОД:</strong> ${generateFractalKey(20)}</div>
                           <div style="color: #ff0055; margin-top:4px;">${text.guard}</div>`;
    }
}

window.onload = function() {
    evolveMatrix();
    setInterval(evolveMatrix, matrixCore.pulseSpeed);
};
</script>
</body>
</html>
