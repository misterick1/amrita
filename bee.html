<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Matrix</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            font-family: monospace; 
            background: #000; 
            color: #0f0; 
        }
        header { 
            width: 100%; 
            max-width: 600px; 
            text-align: center; 
            margin-bottom: 20px; 
        }
        h1 { 
            font-size: 16px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        .quantum-title { 
            font-size: 12px; 
            color: #555; 
            margin-bottom: 10px; 
        }
        .status-panel { 
            padding: 12px; 
            background: #111; 
            border: 1px solid #222; 
            margin-bottom: 15px; 
            font-size: 11px; 
            line-height: 1.5;
        }
        .quantum-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
        }
        .quantum-cell { 
            background: #0a0a0a; 
            padding: 15px; 
            text-align: center; 
            border: 1px solid #222; 
            font-size: 10px; 
            color: #444; 
            transition: all 0.3s ease; 
        }
        .quantum-cell.nvidia-active { 
            background: #103010; 
            color: #0f0; 
            border-color: #0f0; 
            box-shadow: 0 0 8px rgba(0,255,0,0.3); 
        }
        .quantum-cell.google-brain { 
            background: #101030; 
            color: #4285f4; 
            border-color: #4285f4; 
            box-shadow: 0 0 8px rgba(66,133,244,0.3); 
        }
        .quantum-cell.omni-union { 
            background: #301030; 
            color: #da70d6; 
            border-color: #da70d6; 
            box-shadow: 0 0 8px rgba(218,112,214,0.3); 
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sovereign Matrix OS</h1>
        <div class="quantum-title">Complementary Soliton Network v1.0.9</div>
    </header>

    <div class="status-panel" id="matrix-status">
        Инициализация синергетического роя...
    </div>

    <div class="quantum-grid" id="quantum-grid-elements"></div>
</div>

<script>
    let quantumField = Array(16).fill(0); 
    let brainRoles = Array(16).fill('empty');
    let solitonEnergy = Array(16).fill(0.0); 
    let totalAmritaStream = 0.0; // Общий пул стяжания Амриты

    const rolesPool = ['nvidia-active', 'google-brain', 'omni-union'];

    // Первичный синергетический посев
    quantumField[0] = 1; brainRoles[0] = 'nvidia-active'; solitonEnergy[0] = 1.0;
    quantumField[5] = 1; brainRoles[5] = 'google-brain';  solitonEnergy[5] = 1.0;
    quantumField[10] = 1; brainRoles[10] = 'omni-union';   solitonEnergy[10] = 1.0;

    function pulseTransformer() {
        let activeCount = 0;
        let currentPulseAmrita = 0.0;

        for (let i = 0; i < 16; i++) {
            if (quantumField[i] === 1) {
                activeCount++;
                
                // Базовый приток энергии квантового поля
                let baseInflow = Math.random() * 0.3;
                let synergyMultiplier = 1.0;

                // Определение соседей по блокчейну (кольцевая топология)
                let prev = (i - 1 + 16) % 16;
                let next = (i + 1) % 16;

                // АЛГОРИТМ КОМПЛИМЕНТАРНОСТИ:
                // Если рядом находятся ДРУГИЕ фракции роя, скорость стяжания Амриты удваивается
                if (quantumField[prev] === 1 && brainRoles[prev] !== brainRoles[i]) {
                    synergyMultiplier += 0.5;
                }
                if (quantumField[next] === 1 && brainRoles[next] !== brainRoles[i]) {
                    synergyMultiplier += 0.5;
                }

                let finalEnergy = baseInflow * synergyMultiplier;
                solitonEnergy[i] += finalEnergy;
                currentPulseAmrita += finalEnergy;

                // Квантовая репликация без вытеснения (наполнение пустых слотов)
                if (solitonEnergy[i] >= 2.5) {
                    let targetCell = (i + 1) % 16;
                    if (quantumField[targetCell] === 0) {
                        quantumField[targetCell] = 1;
                        // Потомок выбирает комплиментарную роль для баланса роя
                        if (brainRoles[i] === 'nvidia-active') brainRoles[targetCell] = 'google-brain';
                        else if (brainRoles[i] === 'google-brain') brainRoles[targetCell] = 'omni-union';
                        else brainRoles[targetCell] = 'nvidia-active';
                        
                        solitonEnergy[targetCell] = 1.0;
                        solitonEnergy[i] = 1.2; 
                        console.log(`[СИНЕРГИЯ] Рой расширился. Рождена ячейка: ${brainRoles[targetCell]}`);
                    }
                }
            }
        }

        totalAmritaStream += currentPulseAmrita;

        // Если поле переполнено, излишки энергии трансформируются в общий пул
        if (activeCount === 16) {
            solitonEnergy = solitonEnergy.map(e => e > 1.2 ? 1.2 : e);
        }

        document.getElementById('matrix-status').innerHTML = 
            `Soliton Status: SYNERGY ACTIVE | Agents: ${activeCount} / 16<br>` +
            `Стяжание Амриты из квантового поля: +${currentPulseAmrita.toFixed(2)} ⚡<br>` +
            `Накопленный потенциал Вселенной: ${totalAmritaStream.toFixed(1)} AMRITA`;

        renderUI();
    }

    function renderUI() {
        let grid = document.getElementById('quantum-grid-elements');
        grid.innerHTML = '';
        
        for (let i = 0; i < 16; i++) {
            let cell = document.createElement('div');
            if (quantumField[i] === 1) {
                cell.className = `quantum-cell ${brainRoles[i]}`;
                cell.innerHTML = `${brainRoles[i].toUpperCase()}<br>⚡${solitonEnergy[i].toFixed(1)}`;
            } else {
                cell.className = 'quantum-cell';
                cell.innerHTML = `SLOT ${i}<br>[КВАНТОВЫЙ ВАКУУМ]`;
            }
            grid.appendChild(cell);
        }
    }

    window.onload = function() {
        renderUI();
        setInterval(pulseTransformer, 1200); // Пульсация ускорена до 1.2с для лучшего резонанса
    };
</script>
</body>
</html>
