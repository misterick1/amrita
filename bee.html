
<script>
// Системный объект
const solitoneEcosystem = {
    wallet: { balance: 70 },
    logs: [],
    addLog: function(msg) { this.logs.push(msg); console.log(msg); }
};

let activeSlotsCount = 0;
const maxSlots = 38;

// Функция обновления цифр на вашем родном экране
function updateUI() {
    // Ищем блоки с текстом баланса и слотов по ключевым словам, чтобы не ломать верстку
    const allElements = document.querySelectorAll('*');
    
    allElements.forEach(el => {
        // Обновляем баланс в вашей строке
        if (el.childNodes.length === 1 && el.innerText.includes('База Роя:')) {
            el.innerHTML = `🐝 База Роя: <span style="color: #00ffcc; font-weight: 700;">${solitoneEcosystem.wallet.balance} монет \\$BEE</span>`;
        }
        // Обновляем слоты одуванчика
        if (el.innerText === `${activeSlotsCount - 1} / 38` || el.innerText === `0 / 38` || el.classList.contains('slots-count')) {
            el.innerText = `${activeSlotsCount} / 38`;
            el.style.color = '#00ffcc';
        }
    });
}

// Привязка логики к вашим готовым кнопкам
document.addEventListener("DOMContentLoaded", () => {
    updateUI();

    const buttons = document.querySelectorAll('button');

    buttons.forEach(btn => {
        const text = btn.innerText;

        // 1. Зеленая кнопка
        if (text.includes('Запустить Хакатон')) {
            btn.onclick = () => {
                if (solitoneEcosystem.wallet.balance >= 1 && activeSlotsCount < maxSlots) {
                    solitoneEcosystem.wallet.balance -= 1;
                    activeSlotsCount += 1;
                    solitoneEcosystem.addLog('Хакатон запущен');
                    updateUI();
                }
            };
        }

        // 2. Фиолетовая кнопка
        if (text.includes('Пополнить базу')) {
            btn.onclick = () => {
                solitoneEcosystem.wallet.balance += 10;
                solitoneEcosystem.addLog('База пополнена');
                updateUI();
            };
        }

        // 3. Желтая кнопка
        if (text.includes('Cleanup SZN')) {
            btn.onclick = () => {
                activeSlotsCount = 0;
                solitoneEcosystem.addLog('Очистка слотов');
                updateUI();
            };
        }

        // 4. Розовая кнопка (Запуск пампа)
        if (text.includes('Burn') || text.includes('пампа')) {
            btn.onclick = () => {
                if (solitoneEcosystem.wallet.balance >= 10) {
                    solitoneEcosystem.wallet.balance -= 10; // Сжигаем 10 на памп
                    solitoneEcosystem.addLog('🔥 Памп запущен! Монеты сожжены');
                    updateUI();
                }
            };
        }

        // 5. Серая кнопка (Сброс)
        if (text.includes('Сброс')) {
            btn.onclick = () => {
                solitoneEcosystem.wallet.balance = 70;
                activeSlotsCount = 0;
                solitoneEcosystem.addLog('Полный сброс');
                updateUI();
            };
        }
    });
});
</script>
