<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMRITA MIR PRODUCTION Terminal</title>
    <!-- Официальный скрипт Pi Network SDK -->
    <script src="https://minepi.com"></script>
    <style>
        :root {
            --bg-main: #06070a;
            --bg-panel: #0b0c10;
            --bg-card: #141923;
            --text-muted: #8f94a0;
            --text-light: #c5c6c7;
            --neon-blue: #45f3ff;
            --neon-green: #00ffcc;
            --neon-red: #ff3366;
            --neon-gold: #ffcc00;
            --border-color: #1f2833;
        }
        body { background-color: var(--bg-main); color: var(--text-light); font-family: 'Courier New', monospace; padding: 10px; margin: 0; box-sizing: border-box; }
        *, *:before, *:after { box-sizing: inherit; }
        .control-panel-cyber { background-color: var(--bg-panel); max-width: 650px; margin: 10px auto; padding: 15px; border: 2px solid var(--border-color); border-radius: 10px; box-shadow: 0 0 20px rgba(31, 40, 51, 0.3); }
        h1 { color: var(--neon-gold); text-align: center; text-transform: uppercase; font-size: 1.2rem; letter-spacing: 1px; border-bottom: 2px dashed var(--border-color); padding-bottom: 10px; margin-top: 5px; margin-bottom: 15px; text-shadow: 0 0 10px var(--neon-gold); }
        h2 { font-size: 0.9rem; text-transform: uppercase; margin: 15px 0 8px 0; padding-left: 4px; letter-spacing: 1px; color: var(--neon-gold); border-left: 3px solid var(--neon-gold); }
        .pi-btn-execute { width: 100%; background: linear-gradient(45deg, #ffcc00, #dba200); color: #000; border: none; padding: 14px; border-radius: 6px; font-family: inherit; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-bottom: 12px; font-size: 13px; box-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 10px 0; }
        .stat-card { background: var(--bg-card); padding: 10px; border-radius: 6px; border-left: 3px solid var(--neon-gold); }
        .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { font-size: 13px; font-weight: bold; margin-top: 3px; word-break: break-all; }
        .terminal-logs { background: #000; border: 1px solid var(--border-color); border-radius: 4px; padding: 8px; margin-top: 15px; font-size: 10px; height: 110px; overflow-y: auto; color: #00ff00; }
        .log-entry::before { content: "> "; }
    </style>
</head>
<body>

    <div class="control-panel-cyber">
        <h1>AMRITA MIR PRODUCTION NODE</h1>
        
        <h2>&nbsp;Pi Network Core Terminal</h2>

        <!-- Главная кнопка запуска -->
        <button class="pi-btn-execute" onclick="runPiProductionTransaction()">
            <span>Запустить боевую транзакцию Pi</span>
        </button>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Домен авторизации</div>
                <div class="stat-value" style="color: var(--neon-blue);">amrita-mir.com</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pi SDK Статус</div>
                <div id="sdkStatus" class="stat-value" style="color: var(--neon-red);">ОЖИДАНИЕ КЛЮЧА</div>
            </div>
        </div>

        <div class="terminal-logs" id="terminal">
            <div class="log-entry">Боевое ядро развернуто на домене. Требуется инициализация App Key.</div>
        </div>
    </div>

    <script>
        let isSdkReady = false;

        function addLog(text) {
            const terminal = document.getElementById('terminal');
            const time = `[${new Date().toLocaleTimeString()}] `;
            const newEntry = document.createElement('div');
            newEntry.className = 'log-entry';
            newEntry.innerText = time + text;
            terminal.appendChild(newEntry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Автоматический запрос ключа при загрузке страницы прямо на вашем домене amrita-mir.com
        window.onload = function() {
            let piKey = prompt("Внесите ваш App API Key из панели develop.pi для активации ноды:");
            if (!piKey) {
                addLog("Ошибка: Ключ не введен. Работа шлюза заблокирована.");
                return;
            }

            try {
                if (window.Pi) {
                    // Инициализируем сеть вашим личным боевым ключом приложения
                    Pi.init({ version: "2.0", sandbox: false, apiKey: piKey });
                    isSdkReady = true;
                    document.getElementById('sdkStatus').innerText = "АКТИВЕН";
                    document.getElementById('sdkStatus').style.color = "var(--neon-green)";
                    addLog("Успех! Боевой Pi SDK успешно привязан к ключу приложения.");
                }
            } catch (e) {
                addLog("Ошибка привязки SDK к вашему ключу.");
            }
        };

        async function runPiProductionTransaction() {
            if (!isSdkReady) {
                addLog("Ошибка: Сначала введите корректный App API Key!");
                return;
            }

            addLog("Запуск платежного шлюза... Запрос авторизации в Pi Browser...");
            try {
                const scopes = ['username', 'payments'];
                const authResult = await Pi.authenticate(scopes, function(payment) {
                    addLog("Обнаружен незавершенный платеж. Синхронизация...");
                });
                
                addLog(`Пионер авторизован: ${authResult.user.username}`);
                addLog("Отправка ордера на 1.00 Pi в мейннет...");

                await Pi.createPayment({
                    amount: 1.00,
                    memo: "Production Verification - Amrita Mir Token",
                    metadata: { domain: "amrita-mir.com" },
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        addLog(`Ордер скомпилирован на серверах Pi. ID: ${paymentId.substring(0,8)}...`);
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        addLog(`УСПЕХ! Блокчейн Pi подтвердил перевод. Хэш: ${txid.substring(0,8)}...`);
                        alert("Финальный шаг успешно выполнен! Проект активирован.");
                    },
                    onCancel: function(paymentId) { addLog("Транзакция отменена."); },
                    onError: function(error, payment) { addLog(`Ошибка: ${error.message}`); }
                });
            } catch (err) {
                addLog(`Ошибка кошелька: ${err.message}`);
            }
        }
    </script>
</body>
</html>
