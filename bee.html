<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квантовый Рой BEE: Солитонный Куб</title>
<style>
body {
    margin: 0;
    padding: 20px;
    font-family: sans-serif;
    background: linear-gradient(45deg, #0b0b0d, #14141c);
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
header {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 25px;
}
h1 {
    font-size: 18px;
    text-transform: uppercase;
    background: linear-gradient(45deg, #00ffcc, #9945FF); /* Цвета Solana */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0;
}
.container {
    width: 100%;
    max-width: 600px;
    background: #151522;
    padding: 20px;
    border-radius: 12px;
    box-sizing: border-box;
    margin-bottom: 15px;
    border: 1px solid #3a3a52;
}
.status-panel {
    margin-bottom: 15px;
    padding: 12px;
    background: #0d0d16;
    border-radius: 6px;
    border-left: 4px solid #00ffcc;
    font-family: monospace;
}
.status-panel div { margin-bottom: 6px; }
.mode-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 15px;
}
.mode-btn {
    background: #212130;
    color: #fff;
    border: 1px solid #3a3a52;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    text-align: center;
}
.mode-btn.active {
    border-color: #00ffcc;
    box-shadow: 0 0 8px rgba(0,255,204,0.3);
    font-weight: bold;
}
.input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.input-group button {
    background: #1c1c2b;
    color: white;
    border: 1px solid #2d2d42;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    text-align: left;
}
.quantum-field-title {
    font-size: 12px;
    color: #9945FF;
    text-transform: uppercase;
    margin-bottom: 10px;
    letter-spacing: 1px;
    font-weight: bold;
}
.quantum-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    background: #0d0d16;
    padding: 15px;
    border-radius: 8px;
    border: 1px dashed #9945FF;
}
.quantum-cell {
    background: #1c1c2b;
    padding: 12px;
    text-align: center;
    font-family: monospace;
    font-size: 14px;
    border-radius: 4px;
    color: #4a4a6a;
    transition: all 0.1s ease;
}
.quantum-cell.active {
    background: #00ffcc;
    color: #000;
    box-shadow: 0 0 10px #00ffcc;
    font-weight: bold;
}
.quantum-cell.edit {
    background: #ff0055;
    color: #fff;
    box-shadow: 0 0 10px #ff0055;
    font-weight: bold;
}
</style>
</head>
<body>

<header id="main-header">
<h1 id="app-title">SOLANA SOLITON SWARM</h1>
</header>

<div class="container">
<!-- Панель управления геометрией Куба -->
<div class="quantum-field-title">Режим Солитонного Гео-Поля</div>
<div class="mode-selector">
<div class="mode-btn active" id="mode-circle" onclick="setGeoMode('CIRCLE')">◯ КРУГ (Запуск)</div>
<div class="mode-btn" id="mode-triangle" onclick="setGeoMode('TRIANGLE')">△ ТРЕУГОЛЬНИК (Ред.)</div>
<div class="mode-btn" id="mode-square" onclick="setGeoMode('SQUARE')">☐ КВАДРАТ (Стаб.)</div>
</div>

<div class="status-panel">
<div id="info-base">Сетевой Мост Solana: Активен</div>
<div id="info-slots">Солитоны в кубе: 0</div>
<div id="info-balance">Энергия Ядра: 70 $BEE</div>
<div id="info-speed" style="color: #00ffcc;">Скорость Solana: ~400ms пульс</div>
</div>

<div class="input-group">
<button onclick="goLaunch()">🚀 Запустить Солитон в 4D Куб (-1 $BEE)</button>
<button onclick="goRefill()">💰 Накачать Квантовое поле (+10 $BEE)</button>
<button onclick="goReset()">🔄 Сбросить Геометрию Куба</button>
</div>
</div>

<div class="container">
<div class="quantum-field-title" id="field-title">МАТРИЦА КУБИТОВ СОЛИТОНОВ (4D)</div>
<div class="quantum-grid" id="quantum-grid"></div>
</div>

<script>
window.onerror = function(msg, url, line) {
    let d = document.createElement('div');
    d.style = "position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:9999;padding:15px;box-sizing:border-box;font-family:monospace;";
    d.innerText = "Ошибка: " + msg + " | Строка: " + line;
    document.body.appendChild(d);
    return false;
};

const quantumNet = {
    balance: 70,
    slots: 0,
    geoMode: 'CIRCLE' // Текущий геометрический режим управления
};

let quantumField = Array(16).fill(0);
let solanaPulseInterval = null;

// Мутация поля на сверхскорости Solana
function mutateQuantumField() {
    for (let i = 0; i < 16; i++) {
        quantumField[i] = Math.random() > 0.6 ? 1 : 0;
    }
}

function setGeoMode(mode) {
    quantumNet.geoMode = mode;
    
    document.getElementById('mode-circle').className = 'mode-btn';
    document.getElementById('mode-triangle').className = 'mode-btn';
    document.getElementById('mode-square').className = 'mode-btn';
    
    if(mode === 'CIRCLE') document.getElementById('mode-circle').className = 'mode-btn active';
    if(mode === 'TRIANGLE') document.getElementById('mode-triangle').className = 'mode-btn active';
    if(mode === 'SQUARE') document.getElementById('mode-square').className = 'mode-btn active';
    
    renderQuantumUI();
}

function renderQuantumUI() {
    let balEl = document.getElementById('info-balance');
    let slotsEl = document.getElementById('info-slots');
    
    if (balEl) { balEl.innerText = "Энергия Ядра: " + quantumNet.balance + " $BEE"; }
    if (slotsEl) { slotsEl.innerText = "Солитоны в кубе: " + quantumNet.slots; }

    let grid = document.getElementById('quantum-grid');
    if (grid) {
        grid.innerHTML = '';
        for (let i = 0; i < 16; i++) {
            let cell = document.createElement('div');
            
            if (quantumField[i] === 1) {
                // Визуализация в зависимости от выбранного знака «Игры в кальмара»
                if (quantumNet.geoMode === 'CIRCLE') {
                    cell.className = 'quantum-cell active';
                    cell.innerText = '◯';
                } else if (quantumNet.geoMode === 'TRIANGLE') {
                    cell.className = 'quantum-cell edit';
                    cell.innerText = '△';
                } else {
                    cell.className = 'quantum-cell active';
                    cell.style.background = '#9945FF';
                    cell.style.color = '#fff';
                    cell.innerText = '☐';
                }
            } else {
                cell.className = 'quantum-cell';
                cell.innerText = '•';
            }
            grid.appendChild(cell);
        }
    }
}

function goLaunch() {
    if (quantumNet.balance >= 1) {
        quantumNet.balance = quantumNet.balance - 1;
        quantumNet.slots = quantumNet.slots + 1;
        mutateQuantumField();
        renderQuantumUI();
    } else {
        alert("Недостаточно энергии BEE!");
    }
}

function goRefill() { 
    quantumNet.balance = quantumNet.balance + 10; 
    mutateQuantumField();
    renderQuantumUI(); 
}

function goReset() { 
    quantumNet.balance = 70; 
    quantumNet.slots = 0; 
    quantumNet.geoMode = 'CIRCLE';
    setGeoMode('CIRCLE');
    quantumField = Array(16).fill(0);
    renderQuantumUI(); 
}

// Запуск автоматического пульса Solana (~400 миллисекунд)
window.onload = function() {
    mutateQuantumField();
    renderQuantumUI();
    
    // Запускаем бесконечную симуляцию скорости блокчейна Solana
    solanaPulseInterval = setInterval(function() {
        // Поле пульсирует само, пересчитывая солитоны
        mutateQuantumField();
        renderQuantumUI();
    }, 430); // 430ms — среднее время генерации блока в Solana
};
</script>
</body>
</html>
