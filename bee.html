<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMRITA MIR CONTROL PANEL</title>
    <style>
        :root {
            --bg-main: #06070a;
            --bg-panel: #0b0c10;
            --bg-card: #141923;
            --text-muted: #8f94a0;
            --text-light: #c5c6c7;
            --neon-blue: #45f3ff;
            --neon-green: #00ffcc;
            --neon-red: #ff3366;
            --border-color: #1f2833;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            font-family: 'Courier New', monospace;
            padding: 10px;
            margin: 0;
            box-sizing: border-box;
        }

        *, *:before, *:after { box-sizing: inherit; }

        .control-panel-cyber {
            background-color: var(--bg-panel);
            max-width: 650px;
            margin: 10px auto;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(31, 40, 51, 0.3);
        }

        h1 {
            color: var(--neon-blue);
            text-align: center;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 1px;
            border-bottom: 2px dashed var(--border-color);
            padding-bottom: 12px;
            margin-top: 5px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .wallet-btn {
            width: 100%;
            background: linear-gradient(45deg, #00ffcc, #0099ff);
            color: #06070a;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-bottom: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .wallet-btn:active {
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .key-input-field {
            width: 100%;
            background: #000;
            border: 1px dashed var(--border-color);
            padding: 12px;
            color: #fff;
            font-family: inherit;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            margin-bottom: 15px;
            text-align: center;
        }
        .key-input-field:focus { border-color: var(--neon-green); }

        /* Поле вывода готового ключа */
        .output-box {
            display: none;
            background: rgba(0, 255, 204, 0.05);
            border: 1px solid var(--neon-green);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.1);
        }

        .chart-container {
            width: 100%;
            height: 120px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 15px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid var(--neon-blue);
        }
        .stat-card.success { border-left-color: var(--neon-green); }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 14px;
            font-weight: bold;
            margin-top: 4px;
            word-break: break-all;
        }

        .control-group {
            margin-top: 15px;
            background: rgba(20, 25, 35, 0.5);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        label {
            display: block;
            font-size: 11px;
            color: var(--neon-blue);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input[type="number"] {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            color: #fff;
            font-family: inherit;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            margin-bottom: 12px;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-action {
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 14px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            font-size: 13px;
        }
        .btn-action:active { background: var(--neon-blue); color: var(--bg-main); }
        .btn-danger { color: var(--neon-red); border-color: var(--neon-red); }
        .btn-danger:active { background: var(--neon-red); color: #fff; }

        .terminal-logs {
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            margin-top: 15px;
            font-size: 11px;
            height: 90px;
            overflow-y: auto;
            color: #00ff00;
        }
        .log-entry::before { content: "> "; }
    </style>
</head>
<body>

    <div class="control-panel-cyber">
        <h1>AMRITA MIR PANEL v2.0.0</h1>
        
        <!-- Ввод HEX ключа -->
        <input type="text" id="hexKeyInput" class="key-input-field" placeholder="Вставьте приватный ключ (HEX) сюда">

        <!-- Кнопка Оптимизации Ключа -->
        <button class="wallet-btn" id="optimizeKeyBtn" onclick="authorizeAndOptimizeKey()">
            <span>Оптимизировать Ключ OKX</span>
        </button>

        <!-- Блок отображения готового Base58 ключа -->
        <div id="outputContainer" class="output-box">
            <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px;">Ключ для Solflare (Base58):</div>
            <div id="base58Result" style="font-size: 11px; color: var(--neon-green); font-weight: bold; word-break: break-all; user-select: all; margin-bottom: 8px;">-</div>
            <button onclick="copyGeneratedKey()" style="background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 4px 10px; font-family: inherit; font-size: 10px; border-radius: 4px; cursor: pointer;">Скопировать в буфер</button>
        </div>

        <div class="chart-container">
            <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px;">Мониторинг пула монеты</div>
            <div style="font-size: 18px; color: var(--neon-blue); font-weight: bold;">AMRITA (MIR)</div>
            <a href="https://dexscreener.com" target="_blank" style="color: var(--neon-green); font-size: 12px; margin-top: 8px; text-decoration: none; border: 1px solid var(--neon-green); padding: 4px 10px; border-radius: 4px;">Открыть график Live</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card success">
                <div class="stat-label">Оптимизатор</div>
                <div class="stat-value" style="color: var(--neon-green);">Base58 Engine v2</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Баланс SOL</div>
                <div class="stat-value">0.08 SOL</div>
            </div>
            <div class="stat-card" style="grid-column: span 2;">
                <div class="stat-label"><span>Баланс токена AMRITA</span></div>
                <div class="stat-value" style="color: var(--neon-green);">691,802,441 MIR</div>
            </div>
        </div>

        <div class="control-group">
            <label>Объем операции (SOL)</label>
            <input type="number" id="amount" placeholder="0.1" value="0.1" step="0.05" min="0">

            <div class="btn-grid">
                <button class="btn-action" onclick="triggerPortal('buy')">Купить токен</button>
                <button class="btn-action btn-danger" onclick="triggerPortal('sell')">Продать все</button>
            </div>
        </div>

        <div class="terminal-logs" id="terminal">
            <div class="log-entry">Стабильное ядро v2.0.0 развернуто. Звуковые модули отключены для совместимости.</div>
        </div>
    </div>

    <script>
        const contractAddress = "2XNkytvTT4zfX3iKFDCUkBfxVRiUZqGunznWHZx7pump";

        function addLog(text) {
            const terminal = document.getElementById('terminal');
            const time = `[${new Date().toLocaleTimeString()}] `;
            const newEntry = document.createElement('div');
            newEntry.className = 'log-entry';
            newEntry.innerText = time + text;
            terminal.appendChild(newEntry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Чистая математическая конвертация Hex в Base58
        function hexToBase58(hexString) {
            let cleanHex = hexString.replace(/^0x/, '').replace(/\s+/g, '').toLowerCase();
            if (cleanHex.length % 2 !== 0) cleanHex = '0' + cleanHex;
