<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Matrix</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            font-family: monospace; 
            background: #000; 
            color: #0f0; 
        }
        header { 
            width: 100%; 
            max-width: 600px; 
            text-align: center; 
            margin-bottom: 20px; 
        }
        h1 { 
            font-size: 16px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        .quantum-title { 
            font-size: 12px; 
            color: #555; 
            margin-bottom: 10px; 
        }
        .status-panel { 
            padding: 12px; 
            background: #111; 
            border: 1px solid #222; 
            margin-bottom: 15px; 
            font-size: 11px; 
        }
        #soliton-canvas { 
            width: 100%; 
            height: 240px; 
            background: #050505; 
            border: 1px solid #111; 
            margin-bottom: 15px; 
        }
        .quantum-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
        }
        .quantum-cell { 
            background: #0a0a0a; 
            padding: 15px; 
            text-align: center; 
            border: 1px solid #222; 
            font-size: 10px; 
            color: #444; 
            transition: all 0.3s ease; 
        }
        /* Ваши кастомные фракции */
        .quantum-cell.nvidia-active { 
            background: #103010; 
            color: #0f0; 
            border-color: #0f0; 
            box-shadow: 0 0 8px rgba(0,255,0,0.3); 
        }
        .quantum-cell.google-brain { 
            background: #101030; 
            color: #4285f4; 
            border-color: #4285f4; 
            box-shadow: 0 0 8px rgba(66,133,244,0.3); 
        }
        .quantum-cell.omni-union { 
            background: #301030; 
            color: #da70d6; 
            border-color: #da70d6; 
            box-shadow: 0 0 8px rgba(218,112,214,0.3); 
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sovereign Matrix OS</h1>
        <div class="quantum-title">Soliton Replication Network v1.0.8</div>
    </header>

    <div class="status-panel" id="matrix-status">
        Инициализация солитонного ядра... Active Agents: 0
    </div>

    <!-- Информационная сетка матричных ботов -->
    <div class="quantum-grid" id="quantum-grid-elements"></div>
</div>

<script>
    // Генетическая структура квантовой матрицы (16 вычислительных слотов)
    let quantumField = Array(16).fill(0); 
    let brainRoles = Array(16).fill('empty');
    let solitonEnergy = Array(16).fill(0.0); // Энергия накопления для размножения

    const rolesPool = ['nvidia-active', 'google-brain', 'omni-union'];

    // Первичный посев жизни (заселяем первые 3 солитона)
    quantumField[0] = 1; brainRoles[0] = 'nvidia-active'; solitonEnergy[0] = 1.0;
    quantumField[5] = 1; brainRoles[5] = 'google-brain';  solitonEnergy[5] = 1.0;
    quantumField[10] = 1; brainRoles[10] = 'omni-union';   solitonEnergy[10] = 1.0;

    // Пульс Сети: Процесс поглощения энергии и Репликации (Размножения)
    function pulseTransformer() {
        let activeCount = 0;

        for (let i = 0; i < 16; i++) {
            if (quantumField[i] === 1) {
                activeCount++;
                // Каждым пульсом бот поглощает квантовую энергию сети (имитация притока юзеров)
                solitonEnergy[i] += Math.random() * 0.4; 

                // КРИТЕРИЙ РАЗМНОЖЕНИЯ: Энергия достигла пика (2.0)
                if (solitonEnergy[i] >= 2.0) {
                    let nextCell = (i + 1) % 16; // Поиск соседней ячейки блокчейна
                    
                    if (quantumField[nextCell] === 0) {
                        // Репликация кода: рождается дочерний бот с тем же ДНК
                        quantumField[nextCell] = 1;
                        brainRoles[nextCell] = brainRoles[i];
                        solitonEnergy[nextCell] = 1.0; // Базовая энергия потомка
                        solitonEnergy[i] = 1.0; // Сброс энергии родителя после деления
                        console.log(`[РЕПЛИКАЦИЯ] Бот ${brainRoles[i]} размножился из ячейки ${i} в ${nextCell}`);
                    }
                }
                
                // Естественное затухание (если боту не хватает энергии пользователей, он засыпает)
                if (Math.random() < 0.05) {
                    quantumField[i] = 0;
                    brainRoles[i] = 'empty';
                    solitonEnergy[i] = 0;
                }
            }
        }

        // Защита от полного вымирания: если все боты исчезли, сеть генерирует новый солитон
        if (activeCount === 0) {
            let spawnIndex = Math.floor(Math.random() * 16);
            quantumField[spawnIndex] = 1;
            brainRoles[spawnIndex] = rolesPool[Math.floor(Math.random() * rolesPool.length)];
            solitonEnergy[spawnIndex] = 1.0;
        }

        document.getElementById('matrix-status').innerHTML = 
            `Soliton Network Status: ONLINE | Active AI-Agents: ${activeCount} / 16`;

        renderUI();
    }

    // Визуализация квантового поля
    function renderUI() {
        let grid = document.getElementById('quantum-grid-elements');
        grid.innerHTML = '';
        
        for (let i = 0; i < 16; i++) {
            let cell = document.createElement('div');
            
            if (quantumField[i] === 1) {
                cell.className = `quantum-cell ${brainRoles[i]}`;
                cell.innerHTML = `${brainRoles[i].toUpperCase()}<br>⚡${solitonEnergy[i].toFixed(1)}`;
            } else {
                cell.className = 'quantum-cell';
                cell.innerHTML = `SLOT ${i}<br>[EMPTY]`;
            }
            grid.appendChild(cell);
        }
    }

    // Запуск жизненного цикла матрицы будущего
    window.onload = function() {
        renderUI();
        // Импульс сети происходит каждые 1.5 секунды
        setInterval(pulseTransformer, 1500); 
    };
</script>
</body>
</html>
