<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amrita Control Interface</title>
    <!-- Подключаем официальную библиотеку Solana Web3 -->
    <script src="https://unpkg.com"></script>
</head>
<body style="background-color: #ffffff; font-family: sans-serif; margin: 20px;">

    <!-- Встраиваем защитный интерфейс "Слива меда" -->
    <div id="sovereign-panel" style="border: 2px solid #22c55e; padding: 15px; max-width: 500px; margin: 0 auto;">
        <h2 style="margin-top: 0;">🍯 AMRITA HONEY DRAIN — CONTROL INTERFACE</h2>
        
        <p>Текущая матрица баланса: <span style="font-weight: bold;">64 / 108 (Золотое Сечение)</span></p>
        
        <!-- Кнопка подключения кошелька -->
        <button id="connect-wallet" style="background-color: #000000; color: #22c55e; border: 1px solid #22c55e; padding: 10px 20px; font-weight: bold; cursor: pointer; width: 100%; text-align: left; margin-bottom: 15px;">
            [ ПОДКЛЮЧИТЬ SOLFLARE ]
        </button>
        
        <div id="drain-actions" style="margin-top: 15px;">
            <p>Доступный входящий ресурс на понедельник: <span style="background-color: #000000; color: #22c55e; padding: 2px 6px; font-weight: bold;">500</span> SOL</p>
            
            <!-- Кнопка действия -->
            <button id="execute-bundle" style="background-color: #22c55e; color: #ffffff; border: none; padding: 12px 20px; font-weight: bold; width: 100%; cursor: pointer; transition: all 0.3s;">
                ⚡ ЗАПУСТИТЬ АТОМНЫЙ СЛИВ МЕДА (ОБОЙТИ БОТОВ)
            </button>
        </div>
    </div>

    <!-- Логика управления мостом кошелька -->
    <script>
    // Переменная для хранения адреса кошелька
    let userWalletAddress = null;

    // Находим элементы интерфейса
    const connectBtn = document.getElementById('connect-wallet');
    const executeBtn = document.getElementById('execute-bundle');

    // Изначально отключаем главную кнопку, пока кошелек не подключен
    if (executeBtn) {
        executeBtn.disabled = true;
        executeBtn.style.opacity = '0.5';
        executeBtn.style.cursor = 'not-allowed';
    }

    // Функция подключения к Solflare
    connectBtn.addEventListener('click', async () => {
        // Проверяем наличие Solflare (в расширении или встроенном браузере)
        if (window.solflare && window.solflare.isSolflare) {
            try {
                // Запрашиваем коннект
                await window.solflare.connect();
                
                // Извлекаем публичный адрес кошелька
                userWalletAddress = window.solflare.publicKey.toString();
                
                // Делаем красивый короткий адрес для кнопки (например, Аbcd...Wxyz)
                const shortAddress = userWalletAddress.substring(0, 4) + '...' + userWalletAddress.substring(userWalletAddress.length - 4);
                
                // Обновляем состояние верхней кнопки
                connectBtn.innerHTML = `✅ ПОДКЛЮЧЕНО: ${shortAddress}`;
                connectBtn.style.backgroundColor = '#15803d'; // Темно-зеленый цвет
                connectBtn.style.color = '#ffffff';
                
                // Активируем главную кнопку "Слив меда"
                if (executeBtn) {
                    executeBtn.disabled = false;
                    executeBtn.style.opacity = '1';
                    executeBtn.style.cursor = 'pointer';
                }
                
                console.log('Мост успешно установлен с кошельком:', userWalletAddress);
                
            } catch (err) {
                console.error('Пользователь отменил подключение:', err);
                alert('Вы отклонили запрос на подключение кошелька.');
            }
        } else {
            // Если зашли через обычный мобильный браузер без встроенного Solflare
            alert('Для работы моста откройте эту страницу через встроенный браузер внутри самого приложения Solflare (иконка глобуса внизу)!');
            window.open('https://solflare.com', '_blank');
        }
    });

    // Логика работы главной кнопки
    if (executeBtn) {
        executeBtn.addEventListener('click', () => {
            if (!userWalletAddress) {
                alert('Сначала необходимо подключить Solflare!');
                return;
            }
            
            // Здесь будет выполняться ваша логика для токенов Amrita Mir
            alert(`Улей успешно активирован для кошелька: ${userWalletAddress}`);
        });
    }
    </script>
</body>
</html>
