<!-- Встраиваем защитный интерфейс "Слива Меда" в Sovereign Matrix -->
<div id="sovereign-panel" style="border: 1px solid #0f0; padding: 20px; max-width: 600px; margin: 0 auto;">
    <h2>🍯 AMRITA HONEY DRAIN — CONTROL INTERFACE</h2>
    <p>Текущая матрица баланса: <span style="color: #fff;">64 / 108 (Золотое Сечение)</span></p>
    
    <button id="connect-wallet" style="background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; cursor: pointer;">
        [ ПОДКЛЮЧИТЬ SOLFLARE ]
    </button>
    
    <div id="drain-actions" style="margin-top: 20px; display: none;">
        <p>Доступный входящий ресурс на понедельник: <input type="number" id="sol-amount" value="500" style="background:#000; color:#0f0; border:1px solid #0f0; width:70px;"> SOL</p>
        <button id="execute-bundle" style="background: #0f0; color: #000; border: none; padding: 12px; font-weight: bold; width: 100%; cursor: pointer;">
            ⚡ ЗАПУСТИТЬ АТОМНЫЙ СЛИВ МЕДА (ОБОЙТИ БОТОВ)
        </button>
    </div>
</div>

<script>
// Объявляем переменную для хранения адреса кошелька
let userWalletAddress = null;

// Находим кнопки в HTML по их ID
const connectBtn = document.getElementById('connect-wallet');
const executeBtn = document.getElementById('execute-bundle');

// При загрузке страницы отключаем главную кнопку, пока не подключен кошелек
if (executeBtn) {
    executeBtn.disabled = true;
    executeBtn.style.opacity = '0.5';
    executeBtn.style.cursor = 'not-allowed';
}

// Логика кнопки подключения
connectBtn.addEventListener('click', async () => {
    // Проверяем, открыт ли сайт внутри встроенного браузера Solflare или установлено ли расширение
    if (window.solflare && window.solflare.isSolflare) {
        try {
            // Запрашиваем официальное соединение (мост) с кошельком
            const response = await window.solflare.connect();
            
            // Получаем публичный адрес пользователя в виде строки
            userWalletAddress = window.solflare.publicKey.toString();
            
            // Сокращаем адрес для красивого отображения (например: Ех45...3Wqp)
            const shortAddress = userWalletAddress.substring(0, 4) + '...' + userWalletAddress.substring(userWalletAddress.length - 4);
            
            // Меняем интерфейс кнопки
            connectBtn.innerHTML = `✅ ПОДКЛЮЧЕНО: ${shortAddress}`;
            connectBtn.style.backgroundColor = '#10B981'; // меняем цвет на изумрудный
            
            // Разблокируем главную кнопку "Слив меда"
            if (executeBtn) {
                executeBtn.disabled = false;
                executeBtn.style.opacity = '1';
                executeBtn.style.cursor = 'pointer';
            }
            
            console.log('Мост успешно установлен с кошельком:', userWalletAddress);
            
        } catch (err) {
            console.error('Пользователь отменил подключение к улью:', err);
            alert('Вы отклонили подключение кошелька.');
        }
    } else {
        // Если пользователь зашел через обычный браузер без кошелька
        alert('Запустите эту страницу прямо внутри встроенного браузера приложения Solflare (вкладка Планета/Браузер в кошельке)!');
        // Альтернативный вариант - перенаправление на скачивание кошелька
        window.open('https://solflare.com', '_blank');
    }
});

// Логика нажатия на "ЗАПУСТИТЬ АТОМНЫЙ СЛИВ МЕДА"
if (executeBtn) {
    executeBtn.addEventListener('click', () => {
        if (!userWalletAddress) {
            alert('Сначала пройдите авторизацию через верхнюю кнопку!');
            return;
        }
        
        // Сюда в будущем вставляется отправка ваших токенов Amrita Mir
        alert(`Улей активирован для кошелька: ${userWalletAddress}! Мост работает.`);
    });
}
</script>
