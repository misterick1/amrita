<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEE COGNITIVE ECOSYSTEM</title>
    <style>
        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        body {
            background-color: #05010d;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: #0f0720;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7), 0 0 32px rgba(108, 66, 245, 0.1);
            border: 1px solid #22143b;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(61, 37, 110, 0.4);
            padding-bottom: 16px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin: 0;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffffff, #b594ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    <script>
// Квантовое ядро экосистемы
const quantumNet = {
    balance: 70,
    slots: 0,
    lang: 'RU',
    networks: { sol: 'Active', evm: 'Sync', quantum: 'Genesis' }
};

// Словари для мгновенного перевода меню
const locales = {
    RU: {
        title: "🐝 КВАНТОВЫЙ РОЙ BEE",
        base: "База Роя (Квантовый мост):",
        slots: "Эволюционные слоты хакатонов одуванчика:",
        panel: "Панель Создателя Квантового Роя",
        label: "Название хакатона / Квантовый адрес:",
        btn1: "🚀 Запустить Хакатон (1 $BEE)",
        btn2: "💰 Пополнить базу (+10 $BEE)",
        btn3: "⚡ Cleanup SZN (Очистка)",
        btn4: "🔥 Burn $BEE (Запуск пампа)",
        btn5: "🔄 Сброс ядра"
    },
    EN: {
        title: "🐝 BEE QUANTUM SWARM",
        base: "Swarm Base (Quantum Bridge):",
        slots: "Dandelion Hackathon Evolutionary Slots:",
        panel: "Quantum Swarm Creator Panel",
        label: "Hackathon Name / Quantum Address:",
        btn1: "🚀 Launch Hackathon (1 $BEE)",
        btn2: "💰 Refill Base (+10 $BEE)",
        btn3: "⚡ Cleanup SZN (Clear)",
        btn4: "🔥 Burn $BEE (Pump Start)",
        btn5: "🔄 Reset Core"
    }
};

// Функция переключения языков
function switchLang(l) {
    quantumNet.lang = l;
    renderQuantumUI();
}

// Полный рендеринг квантового интерфейса
function renderQuantumUI() {
    const t = locales[quantumNet.lang];
    
    // Переводим тексты в вашем интерфейсе
    document.querySelector('.header h1').innerText = t.title;
    document.getElementById('balance-display').innerHTML = `${t.base} <span class="balance-value">${quantumNet.balance} $BEE</span><br><small style="color:#8c75b8;font-size:11px;">SOL: ${quantumNet.networks.sol} | EVM: ${quantumNet.networks.evm} | QUANTUM: ${quantumNet.networks.quantum}</small>`;
    document.querySelector('.slots-label').innerText = t.slots;
    document.getElementById('slots-display').innerText = `${quantumNet.slots} / 38`;
    document.querySelector('.panel-title').innerText = t.panel;
    document.querySelector('.input-group label').innerText = t.label;
    
    // Переводим кнопки
    const btns = document.querySelectorAll('button');
    btns[0].innerText = t.btn1;
    btns[1].innerText = t.btn2;
    btns[2].innerText = t.btn3;
    btns[3].innerText = t.btn4;
    btns[4].innerText = t.btn5;
}

// Логика кнопок управления
function goLaunch() {
    if (quantumNet.balance >= 1 && quantumNet.slots < 38) {
        quantumNet.balance -= 1; quantumNet.slots += 1;
        const txt = document.getElementById('h-in').value || '$BEE';
        document.getElementById('hack-list').innerHTML += `<div style="padding:4px 0;font-size:13px;color:#00ffcc;">🧬 Блок #${quantumNet.slots} [Quantum]: ${txt}</div>`;
        renderQuantumUI();
    }
}
function goRefill() { quantumNet.balance += 10; renderQuantumUI(); }
function goClean() { quantumNet.slots = 0; document.getElementById('hack-list').innerHTML = ''; renderQuantumUI(); }
function goBurn() { if (quantumNet.balance >= 10) { quantumNet.balance -= 10; renderQuantumUI(); } }
function goReset() { quantumNet.balance = 70; quantumNet.slots = 0; document.getElementById('hack-list').innerHTML = ''; renderQuantumUI(); }

// Инициализация при загрузке страницы
window.onload = function() {
    // Добавляем переключатель языков в самый верх контейнера
    const header = document.querySelector('.header');
    if (header && !document.getElementById('lang-selector')) {
        const div = document.createElement('div');
        div.id = 'lang-selector';
        div.style = 'margin-left:auto; display:flex; gap:8px; font-size:12px; font-weight:700; cursor:pointer;';
        div.innerHTML = `<span onclick="switchLang('RU')" style="color:#00ffcc">RU</span>|<span onclick="switchLang('EN')" style="color:#b594ff">EN</span>`;
        header.appendChild(div);
    }
    renderQuantumUI();
};
</script>
