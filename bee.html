<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квантовый Рой BEE</title>
<style>
body {
    margin: 0;
    padding: 20px;
    font-family: sans-serif;
    background: linear-gradient(45deg, #121214, #1a1a24);
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
header {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
}
h1 {
    font-size: 20px;
    text-transform: uppercase;
    background: linear-gradient(45deg, #ffcc00, #ff6600);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0;
}
.lang-selector {
    background: #2a2a36;
    color: #fff;
    border: 1px solid #ffcc00;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
}
.container {
    width: 100%;
    max-width: 600px;
    background: #1f1f2e;
    padding: 20px;
    border-radius: 12px;
    box-sizing: border-box;
}
.status-panel {
    margin-bottom: 20px;
    padding: 15px;
    background: #151522;
    border-radius: 6px;
    border-left: 4px solid #ffcc00;
}
.status-panel div {
    margin-bottom: 8px;
}
.input-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.input-group button {
    background: #2a2a3a;
    color: white;
    border: 1px solid #3a3a52;
    padding: 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    text-align: left;
}
</style>
</head>
<body>

<header id="main-header">
<h1 id="app-title">КВАНТОВЫЙ РОЙ BEE</h1>
</header>

<div class="container">
<div class="status-panel">
<div id="info-base">База Роя:</div>
<div id="info-slots">Слоты: 0</div>
<div id="info-balance">Баланс: 70 $BEE</div>
</div>

<div class="input-group">
<button onclick="goLaunch()">🚀 Запустить Хакатон (1 $BEE)</button>
<button onclick="goRefill()">💰 Пополнить базу (+10 $BEE)</button>
<button onclick="goClean()">⚡ Cleanup SZN (Очистка)</button>
<button onclick="goBurn()">🔥 Burn $BEE (Запуск пампа)</button>
<button onclick="goReset()">🔄 Сброс ядра</button>
</div>
</div>

<script>
// Перехватчик скрытых ошибок. Если что-то пойдет не так, покажет красную плашку сверху
window.onerror = function(msg, url, line) {
    let d = document.createElement('div');
    d.style = "position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:9999;padding:15px;box-sizing:border-box;font-family:monospace;";
    d.innerText = "Ошибка JS: " + msg + " | Строка: " + line;
    document.body.appendChild(d);
    return false;
};

// 1. Объект состояния системы
const quantumNet = {
    balance: 70,
    slots: 0,
    lang: 'RU'
};

// 2. Словари перевода
const locales = {
    RU: {
        title: "🐝 КВАНТОВЫЙ РОЙ BEE",
        base: "База Роя (Квантовый мост):",
        slots: "Эволюционные слоты хакатонов:",
        btn1: "🚀 Запустить Хакатон (1 $BEE)",
        btn2: "💰 Пополнить базу (+10 $BEE)",
        btn3: "⚡ Cleanup SZN (Очистка)",
        btn4: "🔥 Burn $BEE (Запуск пампа)",
        btn5: "🔄 Сброс ядра"
    },
    EN: {
        title: "🐝 BEE QUANTUM SWARM",
        base: "Swarm Base (Quantum Bridge):",
        slots: "Dandelion Hackathon Slots:",
        btn1: "🚀 Launch Hackathon (1 $BEE)",
        btn2: "💰 Refill Base (+10 $BEE)",
        btn3: "⚡ Cleanup SZN (Clear)",
        btn4: "🔥 Burn $BEE (Pump Start)",
        btn5: "🔄 Reset Core"
    }
};

// 3. Обновление интерфейса
function renderQuantumUI() {
    let currentLang = quantumNet.lang;
    let t = locales[currentLang];
    if (!t) {
        t = locales['RU'];
    }
    
    let baseEl = document.getElementById('info-base');
    let slotsEl = document.getElementById('info-slots');
    let balEl = document.getElementById('info-balance');
    let titleEl = document.getElementById('app-title');

    if (baseEl) { baseEl.innerText = t.base; }
    if (slotsEl) { slotsEl.innerText = t.slots + " " + quantumNet.slots; }
    if (balEl) { balEl.innerText = "Баланс: " + quantumNet.balance + " $BEE"; }
    if (titleEl) { titleEl.innerText = t.title; }

    let btns = document.querySelectorAll('.input-group button');
    if (btns && btns.length >= 5) {
        btns[0].innerText = t.btn1;
        btns[1].innerText = t.btn2;
        btns[2].innerText = t.btn3;
        btns[3].innerText = t.btn4;
        btns[4].innerText = t.btn5;
    }
}

// 4. Функции кнопок управления
function goLaunch() {
    if (quantumNet.balance >= 1) {
        quantumNet.balance = quantumNet.balance - 1;
        quantumNet.slots = quantumNet.slots + 1;
        renderQuantumUI();
    } else {
        alert("Недостаточно баланса!");
    }
}

function goRefill() { 
    quantumNet.balance = quantumNet.balance + 10; 
    renderQuantumUI(); 
}

function goClean() { 
    quantumNet.slots = 0; 
    renderQuantumUI(); 
}

function goBurn() { 
    if (quantumNet.balance > 0) {
        quantumNet.balance = Math.floor(quantumNet.balance * 0.5);
        renderQuantumUI();
    }
}

function goReset() { 
    quantumNet.balance = 70; 
    quantumNet.slots = 0; 
    renderQuantumUI(); 
}

// Функция смены языка
function toggleLanguage() {
    if (quantumNet.lang === 'RU') {
        quantumNet.lang = 'EN';
    } else {
        quantumNet.lang = 'RU';
    }
    renderQuantumUI();
}

// Инициализация при загрузке
window.onload = function() {
    let header = document.getElementById('main-header');
    if (header) {
        let checkBtn = document.getElementById('lang-selector');
        if (!checkBtn) {
            let btn = document.createElement('button');
            btn.id = 'lang-selector';
            btn.className = 'lang-selector';
            btn.innerText = '🌐 Lang';
            btn.onclick = toggleLanguage;
            header.appendChild(btn);
        }
    }
    renderQuantumUI();
};
</script>
</body>
</html>
