<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amrita Mir - Soliton | Colosseum</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #070714;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .soliton-container {
            position: relative;
            width: 300px;
            height: 300px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .faberge-heart {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #8a2be2 0%, #070714 70%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 0 50px #8a2be2;
            animation: pulse 2s infinite ease-in-out;
            transition: transform 0.3s ease;
        }
        .faberge-heart:active { transform: scale(0.9) rotate(5deg); }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 40px #8a2be2; }
            50% { transform: scale(1.05); box-shadow: 0 0 60px #8a2be2; }
            100% { transform: scale(1); box-shadow: 0 0 40px #8a2be2; }
        }
        .core-info {
            margin-top: 30px;
            text-align: center;
            font-size: 1.2rem;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
        }
        .manifesto {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #888;
            max-width: 400px;
            text-align: center;
            line-height: 1.4;
        }
    </style>

    <!-- ПОДКЛЮЧЕНИЕ PI NETWORK SDK -->
    <script src="https://minepi.com"></script>
    <script>
        if (typeof Pi !== 'undefined') {
            Pi.init({ version: "2.0" });
        }
    </script>
</head>
<body>

    <div class="soliton-container" onclick="triggerQuantumSoliton()">
        <div class="faberge-heart"></div>
    </div>

    <div class="core-info">
        <div>Ядро Фаберже: <span id="coin-counter">108</span> Монет</div>
        <div id="matrix-status" style="font-size: 0.9rem; color: #00ffcc; margin-top: 5px;">01 (Кокон)</div>
    </div>

    <div class="manifesto">
        <p><strong>ЦАЙЛИНЬ МАХА ШАКТИ:</strong> Бабочка - Яйцо - Гусеница - Куколка - Бабочка</p>
        <p style="margin-top: 5px; font-style: italic;">Материя — это Свет, застывший на низких частотах.</p>
    </div>

    <script>
        const AMRITA_CORE = 108;
        const C_LIGHT = 299792458;
        const G_CONST = 6.67430e-11;
        const SUN_NIKA_DELAY = 8.0;

        // Адрес твоего запущенного Python-бэкенда
        const BACKEND_URL = "https://amrita-mir.com"; 

        window.onload = function() {
            authPi();
        };

        function authPi() {
            if (typeof Pi === 'undefined') return;
            Pi.authenticate(['username', 'payments'], function(payment) {
                console.log("Зависший платеж:", payment.identifier);
            }).then(function(auth) {
                console.log("[СИСТЕМА] Успешный вход:", auth.user.username);
            });
        }

        function triggerQuantumSoliton() {
            let statusLog = document.getElementById("matrix-status");
            if (statusLog) {
                if (statusLog.innerText.includes("01")) {
                    statusLog.innerText = "10 (Рой Ботов Активен)";
                    statusLog.style.color = "#ff00ff";
                } else {
                    statusLog.innerText = "01 (Кокон)";
                    statusLog.style.color = "#00ffcc";
                }
            }
            makePiPayment();
        }

        function makePiPayment() {
            if (typeof Pi === 'undefined') return;

            Pi.createPayment({
                amount: 1,
                memo: "Тестовая транзакция для MIR-PIFI",
                metadata: { orderId: "108-soliton" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("Платеж создан. Отправка на бэкенд одобрения...");
                    
                    // Передаем paymentId на наш Python сервер для Approve
                    fetch(`${BACKEND_URL}/approve-payment`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        json: JSON.stringify({ paymentId: paymentId })
                    });
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    console.log("Блокчейн принял транзакцию. Отправка на бэкенд завершения...");
                    
                    // Передаем данные на наш Python сервер для Complete
                    fetch(`${BACKEND_URL}/complete-payment`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        json: JSON.stringify({ paymentId: paymentId, txid: txid })
                    }).then(() => {
                        alert("Платеж успешно обработан сервером и блокчейном!");
                    });
                },
                onCancel: function(paymentId) { console.log("Отменено"); },
                onError: function(error, payment) { console.error("Ошибка:", error); }
            });
        }
    </script>
</body>
</html>
