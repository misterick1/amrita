<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMRITA OS // ИНТЕГРАЦИЯ СЕТИ</title>
    <!-- Официальный работающий CDN для Pi SDK -->
    <script src="https://minepi.com"></script>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
        }
        .header {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .step-indicator {
            text-align: center;
            font-size: 40px;
            font-weight: bold;
            color: #00ff00;
            margin-bottom: 20px;
        }
        .card {
            border: 1px dashed #00ff00;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #050505;
        }
        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            color: #88ff88;
            margin-bottom: 10px;
        }
        .balance {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
        }
        .wallet-address {
            font-size: 10px;
            word-break: break-all;
            color: #66aa66;
            text-align: center;
            margin-top: 5px;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: #002200;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 12px;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .btn:hover {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }
        .log-box {
            background-color: #000;
            border: 1px solid #00ff00;
            padding: 10px;
            font-size: 11px;
            height: 150px;
            overflow-y: auto;
            color: #00ff00;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">AMRITA OS // ИНТЕГРАЦИЯ СЕТИ</div>
    <div class="step-indicator">10</div>

    <!-- КАРТОЧКА 1: БАЛАНС И АВТОРИЗАЦИЯ SOLANA -->
    <div class="card">
        <div class="card-title">💼 СЕТЕВОЙ ПОТОК: SOLFLARE (SOLANA)</div>
        <div class="balance" id="sol-balance">ACTIVE SOL</div>
        <div class="wallet-address" id="sol-address">АДРЕС НЕ ОПРЕДЕЛЕН</div>
        <button class="btn" onclick="connectSolflare()">1. ПОДКЛЮЧИТЬ SOLFLARE WALLET</button>
    </div>

    <!-- КАРТОЧКА 2: ИСПОЛНИТЕЛЬНЫЙ КОНТУР -->
    <div class="card">
        <div class="card-title">🧠 КИБЕРНЕТИЧЕСКОЕ ЯДРО И ОБМЕН</div>
        <div id="status-message">Синхронизируйте провайдер Solflare по кнопке 1...</div>
        <button class="btn" onclick="executeSolanaTransaction()">2. АКТИВИРОВАТЬ ОБМЕН (ОТПРАВИТЬ SOL)</button>
    </div>

    <!-- КАРТОЧКА 3: МОНИТОРИНГ -->
    <div class="card">
        <div class="card-title">📟 ЛОГ ВЫПОЛНЕНИЯ ЯДРА (LIVE)</div>
        <div class="log-box" id="log-output">
            [SYSTEM] Локальный изолированный режим активен.
        </div>
    </div>
</div>

<script>
    // Вставьте адрес вашего кошелька-получателя Solana
    const DESTINATION_WALLET = "6DNccQCWhYF7ZmxXUfCg7mXW8xREyE8B3Zk4P5fBvM11"; 
    let currentWalletAddress = "";

    function logToScreen(message) {
        const logBox = document.getElementById('log-output');
        logBox.innerHTML += `<br>${message}`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    window.onload = function() {
        logToScreen("[SYSTEM] Защищенный режим включен. Сетевые запросы FETCH заблокированы во избежание ошибок.");
        if (typeof Pi !== 'undefined') {
            try {
                Pi.init({ version: "2.0", sandbox: false });
                logToScreen("[SUCCESS] Pi SDK шлюз инициализирован.");
            } catch (e) {
                logToScreen("[WARNING] Сбой Pi SDK: " + e.message);
            }
        }
    };

    // Функция авторизации кошелька Solflare без запроса баланса через FETCH
    async function connectSolflare() {
        logToScreen("[WEB3] Поиск активного расширения/приложения...");
        const provider = window.solflare || window.solana;
        
        if (!provider) {
            logToScreen("[WEB3_ERROR] Solflare провайдер не найден.");
            alert("Кошелек Solflare не обнаружен!");
            return;
        }

        try {
            logToScreen("[WEB3] Запрос авторизации в Solflare потоке...");
            await provider.connect();
            
            currentWalletAddress = provider.publicKey.toString();
            document.getElementById('sol-address').innerText = currentWalletAddress;
            document.getElementById('status-message').innerText = "Ядро подключено. Готово к прямой отправке.";
            logToScreen(`[WEB3_SUCCESS] Кошелек успешно привязан: ${currentWalletAddress}`);
        } catch (err) {
            logToScreen("[WEB3_FAILED] Доступ отклонен: " + err.message);
        }
    }

    // Нативная отправка транзакции через внутренние шлюзы Solflare (БЕЗ FETCH)
    async function executeSolanaTransaction() {
        logToScreen("[BRIDGE] Запуск транзакции активации обмена...");
        
        const provider = window.solflare || window.solana;
        if (!provider || !currentWalletAddress) {
            logToScreen("[ERROR] Ошибка: Сначала подключите Solflare по кнопке 1.");
            alert("Пожалуйста, сначала подключите Solflare кошелек!");
            return;
        }

        try {
            logToScreen("[WEB3] Компиляция параметров транзакции...");

            // Создаем чистый Hex-пакет транзакции перевода 0.001 SOL.
            // Solflare сам подставит актуальный recentBlockhash и отправит в сеть.
            const transactionData = {
                feePayer: currentWalletAddress,
                instructions: [
                    {
                        programId: "11111111111111111111111111111111", // System Program
                        keys: [
                            { pubkey: currentWalletAddress, isSigner: true, isWritable: true },
                            { pubkey: DESTINATION_WALLET, isSigner: false, isWritable: true }
                        ],
                        data: "0200000040420f0000000000" // Инструкция на перевод 0.001 SOL в формате байт
                    }
                ]
            };

            logToScreen("[WEB3] Передача транзакции во внутренний обработчик Solflare...");
            
            // Нативный вызов: кошелек сам берет на себя все сетевые запросы
            const result = await provider.signAndSendTransaction(transactionData);
            
            logToScreen(`[SUCCESS] Команда принята кошельком.`);
            logToScreen(`[SIGNATURE] Сигнатура: ${result.signature || result}`);
            document.getElementById('status-message').innerText = "ОБМЕН ИНИЦИИРОВАН";

        } catch (err) {
            logToScreen("[CRITICAL_ERROR] Сбой или отмена пользователем: " + err.message);
        }
    }
</script>

</body>
</html>
