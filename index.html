<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amrita Mir - Soliton | Colosseum</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #070714;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Сердце Фаберже (Солитон) */
        .soliton-container {
            position: relative;
            width: 300px;
            height: 300px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .faberge-heart {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #8a2be2 0%, #070714 70%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 0 50px #8a2be2;
            animation: pulse 2s infinite ease-in-out;
            transition: transform 0.3s ease;
        }
        .faberge-heart:active {
            transform: scale(0.9) rotate(5deg);
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 40px #8a2be2; }
            50% { transform: scale(1.05); box-shadow: 0 0 60px #8a2be2; }
            100% { transform: scale(1); box-shadow: 0 0 40px #8a2be2; }
        }

        /* Рой ботов и Кокон */
        .core-info {
            margin-top: 30px;
            text-align: center;
            font-size: 1.2rem;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
        }
        .manifesto {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #888;
            max-width: 400px;
            text-align: center;
            line-height: 1.4;
        }
    </style>

    <!-- ПОДКЛЮЧЕНИЕ PI NETWORK SDK -->
    <script src="https://minepi.com"></script>
    <script>
        // Принудительная инициализация SDK в тестовой песочнице (sandbox: true)
        if (typeof Pi !== 'undefined') {
            Pi.init({ version: "2.0", sandbox: true });
            console.log("[PI SDK] Успешно инициализирован в Sandbox.");
        } else {
            console.error("[PI SDK] Ошибка: библиотека не загрузилась с сервера Pi.");
        }
    </script>
</head>
<body>

    <div class="soliton-container" onclick="triggerQuantumSoliton()">
        <div class="faberge-heart"></div>
    </div>

    <div class="core-info">
        <div>Ядро Фаберже: <span id="coin-counter">108</span> Монет</div>
        <div id="matrix-status" style="font-size: 0.9rem; color: #00ffcc; margin-top: 5px;">01 (Кокон)</div>
    </div>

    <div class="manifesto">
        <p><strong>ЦАЙЛИНЬ МАХА ШАКТИ:</strong> Бабочка - Яйцо - Гусеница - Куколка - Бабочка</p>
        <p style="margin-top: 5px; font-style: italic;">Материя — это Свет, застывший на низких частотах.</p>
    </div>

    <!-- БЭКЕНД И ПЛАТЕЖНАЯ ЛОГИКА -->
    <script>
        // Квантовые константы
        const AMRITA_CORE = 108;
        const C_LIGHT = 299792458;
        const G_CONST = 6.67430e-11;
        const SUN_NIKA_DELAY = 8.0;

        // Запуск при старте страницы
        window.onload = function() {
            console.log("======================================");
            console.log("  AMRITA-SOLITON-108: MATRIX ACTIVE  ");
            console.log("======================================");
            authPi();
        };

        // Авторизация пользователя внутри Pi Browser
        function authPi() {
            console.log("[СИСТЕМА] Авторизация в Pi Browser...");
            if (typeof Pi === 'undefined') return;

            const scopes = ['username', 'payments'];
            
            function onIncompletePaymentFound(payment) {
                console.log("[БЛОКЧЕЙН] Найден зависший платеж, ID:", payment.identifier);
            }

            Pi.authenticate(scopes, onIncompletePaymentFound).then(function(auth) {
                console.log("[СИСТЕМА] Вход успешен. Разработчик:", auth.user.username);
            }).catch(function(error) {
                console.error("[ОШИБКА] Сбой авторизации SDK:", error);
            });
        }

        // Логика нажатия на Сердце Фаберже
        function triggerQuantumSoliton() {
            console.log("\n[КЛИК] Запуск квантового триггера.");

            // Математические расчеты солитона
            let x = 0.1;
            let t = SUN_NIKA_DELAY;
            let cosh = (Math.exp(x - t) + Math.exp(-(x - t))) / 2;
            let soliton_index = 1 / cosh;
            let mock_mass = 1e24;
            let r_s = (2 * G_CONST * mock_mass) / Math.pow(C_LIGHT, 2);

            let string_resonance = 0;
            for (let n = 1; n <= AMRITA_CORE; n++) {
                string_resonance += Math.sin((n * Math.pi));
            }
            string_resonance = string_resonance / 11;

            // Смена статуса 01 -> 10
            let statusLog = document.getElementById("matrix-status");
            if (statusLog) {
                if (statusLog.innerText.includes("01")) {
                    statusLog.innerText = "10 (Рой Ботов Активен)";
                    statusLog.style.color = "#ff00ff";
                } else {
                    statusLog.innerText = "01 (Кокон)";
                    statusLog.style.color = "#00ffcc";
                }
            }

            console.log("--- КВАНТОВЫЙ МАТРИЧНЫЙ ОТЧЕТ ---");
            console.log("Плотность Светла Солитона:", soliton_index);
            console.log("Радиус Сингулярности Кришны:", r_s);
            console.log("Симфония Струн Шакти:", string_resonance);
            console.log("---------------------------------");

            // Запуск симуляции транзакции Pi
            makePiPayment();
        }

        // Функция проведения платежа в обход бэкенда
        function makePiPayment() {
            if (typeof Pi === 'undefined') {
                alert("Ошибка: Откройте эту страницу строго внутри Pi Browser через меню Develop!");
                return;
            }

            console.log("[БЛОКЧЕЙН] Вызов платежного модуля...");
            
            const paymentData = {
                amount: 1, 
                memo: "Тестовый квантовый платеж MIR-PIFI (Статус 10)",
                metadata: { appId: "mir-pifi-test" }
            };

            const callbacks = {
                onReadyForServerApproval: function(paymentId) {
                    console.log("[SANDBOX] Платеж создан на клиенте. ID:", paymentId);
                    // Имитируем успешный ответ сервера разработчика, чтобы закрыть чек-лист
                    console.log("[SANDBOX] Автоматическое подтверждение транзакции...");
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    console.log("[БЛОКЧЕЙН] Успех! Транзакция в блокчейне. TXID:", txid);
                    alert("Тестовый платеж выполнен! Проверьте чек-лист.");
                },
                onCancel: function(paymentId) {
                    console.log("[кошелек] Отменено пользователем.");
                },
                onError: function(error, payment) {
                    console.error("[ошибка] Ошибка проведения платежа:", error);
                }
            };

            // Вызов встроенного окна оплаты Pi
            Pi.createPayment(paymentData, callbacks);
        }
    </script>
</body>
</html>
