<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amrita Mir - Soliton | Colosseum</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #070714;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Сердце Фаберже (Солитон) */
        .soliton-container {
            position: relative;
            width: 300px;
            height: 300px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .faberge-heart {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #8a2be2 0%, #070714 70%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 0 50px #8a2be2;
            animation: pulse 2s infinite ease-in-out;
            transition: transform 0.3s ease;
        }
        .faberge-heart:active {
            transform: scale(0.9) rotate(5deg);
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 40px #8a2be2; }
            50% { transform: scale(1.05); box-shadow: 0 0 60px #8a2be2; }
            100% { transform: scale(1); box-shadow: 0 0 40px #8a2be2; }
        }

        /* Рой ботов и Кокон */
        .core-info {
            margin-top: 30px;
            text-align: center;
            font-size: 1.2rem;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
        }
        .manifesto {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #888;
            max-width: 400px;
            text-align: center;
            line-height: 1.4;
        }
    </style>

    <!-- ПОДКЛЮЧЕНИЕ PI NETWORK SDK -->
    <script src="https://minepi.com"></script>
    <script>
        // Инициализация для реальной работы в экосистеме Pi Browser (Testnet/Mainnet)
        if (typeof Pi !== 'undefined') {
            Pi.init({ version: "2.0" });
            console.log("[PI SDK] Инициализирован для Testnet.");
        }
    </script>
</head>
<body>

    <div class="soliton-container" onclick="triggerQuantumSoliton()">
        <div class="faberge-heart"></div>
    </div>

    <div class="core-info">
        <div>Ядро Фаберже: <span id="coin-counter">108</span> Монет</div>
        <div id="matrix-status" style="font-size: 0.9rem; color: #00ffcc; margin-top: 5px;">01 (Кокон)</div>
    </div>

    <div class="manifesto">
        <p><strong>ЦАЙЛИНЬ МАХА ШАКТИ:</strong> Бабочка - Яйцо - Гусеница - Куколка - Бабочка</p>
        <p style="margin-top: 5px; font-style: italic;">Материя — это Свет, застывший на низких частотах.</p>
    </div>

    <!-- БЭКЕНД И ПЛАТЕЖНАЯ ЛОГИКА -->
    <script>
        const AMRITA_CORE = 108;
        const C_LIGHT = 299792458;
        const G_CONST = 6.67430e-11;
        const SUN_NIKA_DELAY = 8.0;

        window.onload = function() {
            authPi();
        };

        function authPi() {
            if (typeof Pi === 'undefined') return;
            const scopes = ['username', 'payments'];
            
            Pi.authenticate(scopes, function(payment) {
                console.log("Незавершенный платеж:", payment.identifier);
            }).then(function(auth) {
                console.log("[СИСТЕМА] Авторизация успешна:", auth.user.username);
            }).catch(function(error) {
                console.error("[ОШИБКА] Сбой авторизации:", error);
            });
        }

        function triggerQuantumSoliton() {
            let statusLog = document.getElementById("matrix-status");
            if (statusLog) {
                if (statusLog.innerText.includes("01")) {
                    statusLog.innerText = "10 (Рой Ботов Активен)";
                    statusLog.style.color = "#ff00ff";
                } else {
                    statusLog.innerText = "01 (Кокон)";
                    statusLog.style.color = "#00ffcc";
                }
            }

            // Запуск платежа
            makePiPayment();
        }

        // Прямой вызов создания платежа экосистемы
        function makePiPayment() {
            if (typeof Pi === 'undefined') {
                alert("Откройте приложение внутри Pi Browser!");
                return;
            }
            
            Pi.createPayment({
                amount: 1,
                memo: "Testnet transaction for MIR-PIFI",
                metadata: { orderId: "108-soliton" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("Платеж создан. ID:", paymentId);
                    // Автоматически отправляем встроенный запрос подтверждения для Testnet
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    console.log("Платеж завершен. TXID:", txid);
                    alert("Готово! Транзакция прошла.");
                },
                onCancel: function(paymentId) { },
                onError: function(error, payment) { }
            });
        }
    </script>
</body>
</html>
