<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMRITA OS // ИНТЕГРАЦИЯ СЕТИ</title>
    <!-- Официальный работающий CDN для Pi SDK -->
    <script src="https://minepi.com"></script>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
        }
        .header {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .step-indicator {
            text-align: center;
            font-size: 40px;
            font-weight: bold;
            color: #00ff00;
            margin-bottom: 20px;
        }
        .card {
            border: 1px dashed #00ff00;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #050505;
        }
        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            color: #88ff88;
            margin-bottom: 10px;
        }
        .balance {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
        }
        .wallet-address {
            font-size: 10px;
            word-break: break-all;
            color: #66aa66;
            text-align: center;
            margin-top: 5px;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: #002200;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 12px;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .btn:hover {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }
        .log-box {
            background-color: #000;
            border: 1px solid #00ff00;
            padding: 10px;
            font-size: 11px;
            height: 150px;
            overflow-y: auto;
            color: #00ff00;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">AMRITA OS // ИНТЕГРАЦИЯ СЕТИ</div>
    <div class="step-indicator">10</div>

    <!-- КАРТОЧКА 1: БАЛАНС И АВТОРИЗАЦИЯ SOLANA -->
    <div class="card">
        <div class="card-title">💼 СЕТЕВОЙ ПОТОК: SOLFLARE (SOLANA)</div>
        <div class="balance" id="sol-balance">0.0000 SOL</div>
        <div class="wallet-address" id="sol-address">АДРЕС НЕ ОПРЕДЕЛЕН</div>
        <button class="btn" onclick="connectSolflare()">1. ПОДКЛЮЧИТЬ SOLFLARE WALLET</button>
    </div>

    <!-- КАРТОЧКА 2: ИСПОЛНИТЕЛЬНЫЙ КОНТУР -->
    <div class="card">
        <div class="card-title">🧠 КИБЕРНЕТИЧЕСКОЕ ЯДРО И ОБМЕН</div>
        <div id="status-message">Синхронизируйте провайдер Solflare по кнопке 1...</div>
        <button class="btn" onclick="executeSolanaTransaction()">2. АКТИВИРОВАТЬ ОБМЕН (ОТПРАВИТЬ SOL)</button>
    </div>

    <!-- КАРТОЧКА 3: МОНИТОРИНГ -->
    <div class="card">
        <div class="card-title">📟 ЛОГ ВЫПОЛНЕНИЯ ЯДРА (LIVE)</div>
        <div class="log-box" id="log-output">
            [SYSTEM] Ожидание подключения кошелька...
        </div>
    </div>
</div>

<script>
    // Вставьте адрес вашего кошелька-получателя Solana
    const DESTINATION_WALLET = "6DNccQCWhYF7ZmxXUfCg7mXW8xREyE8B3Zk4P5fBvM11"; 
    
    let currentWalletAddress = "";

    function logToScreen(message) {
        const logBox = document.getElementById('log-output');
        logBox.innerHTML += `<br>${message}`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    window.onload = function() {
        logToScreen("[SYSTEM] Автономный модуль загружен. Внешние зависимости отключены.");
        if (typeof Pi !== 'undefined') {
            try {
                Pi.init({ version: "2.0", sandbox: false });
                logToScreen("[SUCCESS] Pi SDK шлюз инициализирован.");
            } catch (e) {
                logToScreen("[WARNING] Сбой Pi SDK: " + e.message);
            }
        }
    };

    // Функция авторизации кошелька Solflare
    async function connectSolflare() {
        logToScreen("[WEB3] Поиск активного расширения/приложения...");
        const provider = window.solflare || window.solana;
        
        if (!provider) {
            logToScreen("[WEB3_ERROR] Solflare провайдер не найден. Перезапустите страницу внутри кошелька.");
            alert("Кошелек Solflare не обнаружен!");
            return;
        }

        try {
            logToScreen("[WEB3] Запрос авторизации в Solflare потоке...");
            await provider.connect();
            
            currentWalletAddress = provider.publicKey.toString();
            document.getElementById('sol-address').innerText = currentWalletAddress;
            logToScreen(`[WEB3_SUCCESS] Кошелек успешно привязан: ${currentWalletAddress}`);

            // Чтение баланса напрямую через нативный FETCH запрос к блокчейну без библиотек
            logToScreen("[RPC] Фоновое считывание баланса через RPC Solana...");
            const response = await fetch('https://solana.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    jsonrpc: "2.0",
                    id: 1,
                    method: "getBalance",
                    params: [currentWalletAddress]
                })
            });

            const result = await response.json();
            if (result.result && result.result.value !== undefined) {
                const solAmount = result.result.value / 1000000000;
                document.getElementById('sol-balance').innerText = `${solAmount.toFixed(4)} SOL`;
                document.getElementById('status-message').innerText = "Ядро готово к совершению транзакции.";
                logToScreen(`[RPC_SUCCESS] Текущий баланс реестра зафиксирован: ${solAmount.toFixed(4)} SOL`);
            }
        } catch (err) {
            logToScreen("[WEB3_FAILED] Доступ отклонен: " + err.message);
        }
    }

    // ИСПРАВЛЕНО: Нативная транзакция без использования внешней переменной solanaWeb3
    async function executeSolanaTransaction() {
        logToScreen("[BRIDGE] Запуск транзакции активации обмена...");
        
        const provider = window.solflare || window.solana;
        if (!provider || !currentWalletAddress) {
            logToScreen("[ERROR] Ошибка: Сначала подключите Solflare по кнопке 1.");
            alert("Пожалуйста, сначала подключите Solflare кошелек!");
            return;
        }

        try {
            logToScreen("[RPC] Запрос актуальных параметров сети (Recent Blockhash)...");
            
            // Получаем свежий хэш блока напрямую из сети Solana
            const blockhashResponse = await fetch('https://solana.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    jsonrpc: "2.0",
                    id: 1,
                    method: "getLatestBlockhash"
                })
            });
            const blockhashData = await blockhashResponse.json();
            const recentBlockhash = blockhashData.result.value.blockhash;

            logToScreen("[RPC] Компиляция параметров транзакции...");

            // Создаем чистый объект транзакции по стандартам Solana Web3 API
            const transactionData = {
                feePayer: currentWalletAddress,
                recentBlockhash: recentBlockhash,
                instructions: [
                    {
                        programId: "11111111111111111111111111111111", // System Program ID
                        keys: [
                            { pubkey: currentWalletAddress, isSigner: true, isWritable: true },
                            { pubkey: DESTINATION_WALLET, isSigner: false, isWritable: true }
                        ],
                        // Перевод 0.001 SOL (1,000,000 лампортов) в шестнадцатеричном формате (Hex)
                        data: "0200000040420f0000000000" 
                    }
                ]
            };

            logToScreen("[WEB3] Передача транзакции на подпись в Solflare...");
            
            // Отправляем скомпилированный блок напрямую в провайдер Solflare
            const result = await provider.signAndSendTransaction(transactionData);
            
            logToScreen(`[PENDING] Транзакция отправлена в реестр.`);
            logToScreen(`[SIGNATURE] Сигнатура сети: ${result.signature || result}`);
            document.getElementById('status-message').innerText = "ОБМЕН ПОДТВЕРЖДЕН В СЕТИ";

        } catch (err) {
            logToScreen("[CRITICAL_ERROR] Сбой выполнения или отмена: " + err.message);
        }
    }
</script>

</body>
</html>
