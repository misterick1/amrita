<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMRITA OS // СУВЕРЕННЫЙ ЦИФРОВОЙ СЛЕД</title>
    <!-- Официальный работающий CDN для Pi SDK -->
    <script src="https://minepi.com"></script>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        .header {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .step-indicator {
            text-align: center;
            font-size: 40px;
            font-weight: bold;
            color: #00ff00;
            margin-bottom: 20px;
        }
        .card {
            border: 1px dashed #00ff00;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #050505;
        }
        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            color: #88ff88;
            margin-bottom: 10px;
        }
        .balance {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
        }
        .wallet-address {
            font-size: 10px;
            word-break: break-all;
            color: #66aa66;
            text-align: center;
            margin-top: 5px;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: #002200;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 12px;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .btn:hover {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }
        .btn-small {
            padding: 6px;
            font-size: 12px;
            margin-top: 10px;
        }
        .log-box {
            background-color: #000;
            border: 1px solid #00ff00;
            padding: 10px;
            font-size: 12px;
            height: 100px;
            overflow-y: auto;
            color: #00ff00;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">AMRITA OS // СИНХРОНИЗАЦИЯ</div>
    <div class="step-indicator">10</div>

    <div class="card">
        <div class="card-title">💼 БАЛАНС КОНТУРА & SOLFLARE</div>
        <!-- Добавлены id для динамического обновления скриптом -->
        <div class="balance" id="sol-balance">0.0000 SOL</div>
        <div class="wallet-address" id="sol-address">КОШЕЛЕК НЕ ПОДКЛЮЧЕН</div>
        <button class="btn btn-small" onclick="connectSolflare()">ПОДКЛЮЧИТЬ SOLFLARE</button>
    </div>

    <div class="card">
        <div class="card-title">🧠 КИБЕРНЕТИЧЕСКОЕ ЯДРО</div>
        <div id="status-message">Автономная экосистема активна</div>
        <button class="btn" onclick="launchPiPayment()">ВЫЗВАТЬ КОШЕЛЕК PI</button>
    </div>

    <div class="card">
        <div class="card-title">📟 ОКНО ВЫВОДА ТРАНЗАКЦИИ (LIVE)</div>
        <div class="log-box" id="log-output">
            [SYSTEM] Инициализация Pi SDK моста...<br>
            [SYSTEM] Ожидание вызова среды Pi Browser...
        </div>
    </div>
</div>

<script>
    function logToScreen(message) {
        const logBox = document.getElementById('log-output');
        logBox.innerHTML += `<br>${message}`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // Инициализация оригинального Pi SDK при загрузке страницы
    window.onload = function() {
        if (typeof Pi !== 'undefined') {
            try {
                Pi.init({ version: "2.0", sandbox: false });
                logToScreen("[SUCCESS] Pi SDK успешно инициализирован");
            } catch (e) {
                logToScreen("[ERROR] Ошибка инициализации SDK: " + e.message);
            }
        } else {
            logToScreen("[WARNING] Запустите этот сайт внутри официального Pi Browser!");
        }
    };

    // Функция подключения кошелька Solflare и чтения баланса через RPC
    async function connectSolflare() {
        logToScreen("[INFO] Поиск активного провайдера Solana...");
        
        // Проверяем наличие Solflare (или совместимого window.solana)
        const provider = window.solflare || window.solana;
        
        if (!provider) {
            logToScreen("[WARNING] Кошелек Solflare не обнаружен. Установите расширение или откройте в крипто-браузере.");
            alert("Кошелек Solflare не найден в текущем браузере!");
            return;
        }

        try {
            logToScreen("[SYSTEM] Запрос авторизации в Solflare...");
            // Подключаемся к кошельку
            await provider.connect();
            
            const publicKey = provider.publicKey.toString();
            logToScreen(`[SUCCESS] Solflare подключен. Адрес: ${publicKey}`);
            document.getElementById('sol-address').innerText = publicKey;

            // Запрашиваем реальный баланс через публичный RPC узел Solana Mainnet
            logToScreen("[SYSTEM] Запрос баланса из блокчейна Solana RPC...");
            const response = await fetch('https://solana.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    jsonrpc: "2.0",
                    id: 1,
                    method: "getBalance",
                    params: [publicKey]
                })
            });

            const result = await response.json();
            if (result.result && result.result.value !== undefined) {
                // Баланс возвращается в лампортах (1 SOL = 1,000,000,000 Lamports)
                const solAmount = result.result.value / 1000000000;
                document.getElementById('sol-balance').innerText = `${solAmount.toFixed(4)} SOL`;
                logToScreen(`[SUCCESS] Баланс обновлен: ${solAmount.toFixed(4)} SOL`);
            } else {
                logToScreen("[ERROR] Не удалось прочитать структуру баланса из RPC.");
            }

        } catch (err) {
            logToScreen("[FAILED] Ошибка подключения Solflare: " + err.message);
        }
    }

    // Оригинальная функция вызова платежа для активации ядра
    function launchPiPayment() {
        logToScreen("[INFO] Запуск транзакции активации контура...");
        if (typeof Pi !== 'undefined') {
            Pi.createPayment({
                amount: 1,
                memo: "Amrita Core Activation",
                metadata: { swarm: "ezhenysh" },
                uid: "user-activation-pifi"
            }, {
                onReadyForServerApproval: function(paymentId) {
                    logToScreen("[SDK] Ожидание апрува сервером: " + paymentId);
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    logToScreen("[SUCCESS] Транзакция завершена сетью. TxID: " + txid);
                },
                onCancel: function(paymentId) {
                    logToScreen("[CANCEL] Транзакция отменена пользователем. ID: " + paymentId);
                },
                onError: function(error, payment) {
                    logToScreen("[ERROR] Сбой выполнения платежа: " + error.message);
                }
            });
        } else {
            alert("Критическая ошибка: Запустите этот сайт внутри официального Pi Browser!");
        }
    }
</script>

</body>
</html>
