<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMRITA OS // АВТОНОМНЫЙ МУЛЬТИВЕРС</title>
    <!-- Официальный работающий CDN для Pi SDK -->
    <script src="https://minepi.com"></script>
    <!-- Добавлен официальный Web3 модуль для реальных транзакций в Solana -->
    <script src="https://unpkg.com"></script>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
        }
        .header {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .step-indicator {
            text-align: center;
            font-size: 40px;
            font-weight: bold;
            color: #00ff00;
            margin-bottom: 20px;
        }
        .card {
            border: 1px dashed #00ff00;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #050505;
        }
        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            color: #88ff88;
            margin-bottom: 10px;
        }
        .balance {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
        }
        .wallet-address {
            font-size: 10px;
            word-break: break-all;
            color: #66aa66;
            text-align: center;
            margin-top: 5px;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: #002200;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 12px;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .btn:hover {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }
        .log-box {
            background-color: #000;
            border: 1px solid #00ff00;
            padding: 10px;
            font-size: 11px;
            height: 150px;
            overflow-y: auto;
            color: #00ff00;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">AMRITA OS // ИНТЕГРАЦИЯ СЕТИ</div>
    <div class="step-indicator">10</div>

    <!-- КАРТОЧКА 1: БАЛАНС И АВТОРИЗАЦИЯ SOLANA -->
    <div class="card">
        <div class="card-title">💼 СЕТЕВОЙ ПОТОК: SOLFLARE (SOLANA)</div>
        <div class="balance" id="sol-balance">0.0000 SOL</div>
        <div class="wallet-address" id="sol-address">АДРЕС НЕ ОПРЕДЕЛЕН</div>
        <button class="btn" onclick="connectSolflare()">1. ПОДКЛЮЧИТЬ SOLFLARE WALLET</button>
    </div>

    <!-- КАРТОЧКА 2: ИСПОЛНИТЕЛЬНЫЙ КОНТУР -->
    <div class="card">
        <div class="card-title">🧠 КИБЕРНЕТИЧЕСКИЙ ТРИГГЕР</div>
        <div id="status-message">Ожидайте синхронизации Web3 провайдера...</div>
        <!-- Изменена функция: теперь кнопка запускает РЕАЛЬНУЮ транзакцию в Solana -->
        <button class="btn" onclick="executeRealSolanaTransaction()">2. АКТИВИРОВАТЬ ОБМЕН (ОТПРАВИТЬ SOL)</button>
    </div>

    <!-- КАРТОЧКА 3: МОНИТОРИНГ -->
    <div class="card">
        <div class="card-title">📟 ЛОГ ВЫПОЛНЕНИЯ ЯДРА (LIVE)</div>
        <div class="log-box" id="log-output">
            [SYSTEM] Ожидание подключения Solflare кошелька...
        </div>
    </div>
</div>

<script>
    // Вставьте сюда адрес вашего кошелька-приемника в сети Solana, куда должны идти монеты
    const DESTINATION_WALLET = "6DNccQCWhYF7ZmxXUfCg7mXW8xREyE8B3Zk4P5fBvM11"; 
    
    let currentWalletAddress = "";
    let solanaConnection = null;

    function logToScreen(message) {
        const logBox = document.getElementById('log-output');
        logBox.innerHTML += `<br>${message}`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // Инициализация соединения с блокчейном Solana через публичный RPC узел Mainnet
    window.onload = function() {
        if (typeof solanaWeb3 !== 'undefined') {
            // Подключаемся к официальному RPC узлу Solana Mainnet
            solanaConnection = new solanaWeb3.Connection("https://solana.com", "confirmed");
            logToScreen("[SUCCESS] Связь с блокчейн-реестром Solana RPC установлена.");
        } else {
            logToScreen("[ERROR] Ошибка загрузки solanaWeb3 библиотеки.");
        }
    };

    // Функция авторизации кошелька Solflare
    async function connectSolflare() {
        logToScreen("[WEB3] Сканирование расширений браузера...");
        const provider = window.solflare || window.solana;
        
        if (!provider) {
            logToScreen("[WEB3_ERROR] Кошелек Solflare не найден. Откройте сайт внутри крипто-кошелька.");
            alert("Установите расширение Solflare!");
            return;
        }

        try {
            logToScreen("[WEB3] Запрос авторизации кошелька...");
            await provider.connect();
            
            currentWalletAddress = provider.publicKey.toString();
            document.getElementById('sol-address').innerText = currentWalletAddress;
            logToScreen(`[WEB3_SUCCESS] Кошелек подключен успешно: ${currentWalletAddress}`);

            // Автоматическое чтение реального баланса из блокчейна Solana
            if (solanaConnection) {
                const publicKeyObj = new solanaWeb3.PublicKey(currentWalletAddress);
                const balanceLamports = await solanaConnection.getBalance(publicKeyObj);
                const solAmount = balanceLamports / 1000000000;
                
                document.getElementById('sol-balance').innerText = `${solAmount.toFixed(4)} SOL`;
                document.getElementById('status-message').innerText = "Провайдер успешно синхронизирован. Готов к обмену.";
                logToScreen(`[RPC] Текущий баланс вашего кошелька: ${solAmount.toFixed(4)} SOL`);
            }
        } catch (err) {
            logToScreen("[WEB3_FAILED] Ошибка подключения: " + err.message);
        }
    }

    // НАСТОЯЩАЯ ТРАНЗАКЦИЯ SOLANA: функция срабатывания кнопки обмена
    async function executeRealSolanaTransaction() {
        logToScreen("[BRIDGE] Инициализация процесса отправки активов...");
        
        const provider = window.solflare || window.solana;
        if (!provider || !currentWalletAddress) {
            logToScreen("[ERROR] Сбой: Сначала необходимо подключить кошелек по кнопке 1!");
            alert("Пожалуйста, сначала подключите Solflare кошелек!");
            return;
        }

        try {
            logToScreen("[RPC] Создание структуры транзакции Solana...");
            const fromPubkey = new solanaWeb3.PublicKey(currentWalletAddress);
            const toPubkey = new solanaWeb3.PublicKey(DESTINATION_WALLET);

            // Получаем свежий хэш блока для подтверждения сети
            const { blockhash } = await solanaConnection.getLatestBlockhash();

            // Формируем блок транзакции перевода (например, 0.001 SOL для теста активации)
            const transaction = new solanaWeb3.Transaction({
                recentBlockhash: blockhash,
                feePayer: fromPubkey
            }).add(
                solanaWeb3.SystemProgram.transfer({
                    fromPubkey: fromPubkey,
                    toPubkey: toPubkey,
                    lamports: 0.001 * 1000000000 // 0.001 SOL в лампортах
                })
            );

            logToScreen("[WEB3] Отправка транзакции в Solflare на подпись пользователю...");
            
            // Вызываем официальное всплывающее окно Solflare для подписи транзакции
            const { signature } = await provider.signAndSendTransaction(transaction);
            
            logToScreen(`[PENDING] Транзакция подписана и отправлена в сеть. Ожидание блоков...`);
            logToScreen(`[SIGNATURE] Хэш транзакции: ${signature}`);

            // Ожидаем подтверждения транзакции валидаторами блокчейна
            await solanaConnection.confirmTransaction(signature, "confirmed");
            
            logToScreen(`[SUCCESS] Транзакция успешно подтверждена блокчейном Solana!`);
            document.getElementById('status-message').innerText = "ОБМЕН ЗАВЕРШЕН УСПЕШНО";

            // Обновляем баланс после списания
            const newBalance = await solanaConnection.getBalance(fromPubkey);
            document.getElementById('sol-balance').innerText = `${(newBalance / 1000000000).toFixed(4)} SOL`;

        } catch (err) {
            logToScreen("[CRITICAL_ERROR] Транзакция отклонена или произошел сбой: " + err.message);
        }
    }
</script>

</body>
</html>
